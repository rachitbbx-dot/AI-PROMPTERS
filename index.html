<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Prompt Gallery</title>

<meta name="google-adsense-account" content="ca-pub-4850710373893560">

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4850710373893560"
crossorigin="anonymous"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
background:#0f172a;
color:white;
line-height:1.6;
}

body::before{
content:"";
position:fixed;
inset:0;

background:
radial-gradient(circle at 20% 20%, #3b82f6, transparent 40%),
radial-gradient(circle at 80% 70%, #06b6d4, transparent 40%);

filter:blur(120px);
opacity:.45;

z-index:-1;
}

.container{
max-width:760px;
margin:auto;
padding:26px 16px 60px;
}

.hero{
text-align:center;
margin-bottom:32px;
}

.logo{
width:90px;
height:90px;
margin:auto;
border-radius:50%;
overflow:hidden;

background:rgba(255,255,255,.05);
backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.2);

box-shadow:
0 10px 30px rgba(0,0,0,.35);
}

.logo img{
width:100%;
height:100%;
object-fit:cover;
}

.hero h1{
margin-top:14px;
font-size:30px;
font-weight:700;

background:linear-gradient(90deg,#3b82f6,#06b6d4);
-webkit-background-clip:text;
color:transparent;
}

.hero p{
margin-top:6px;
opacity:.75;
font-size:14px;
}

.buttons{
margin-top:22px;
display:flex;
flex-direction:column;
gap:12px;
}

.btn{
padding:15px;

border-radius:14px;

background:rgba(255,255,255,.08);

border:1px solid rgba(255,255,255,.15);

backdrop-filter:blur(20px);

color:white;
font-size:15px;

cursor:pointer;

transition:.2s;

box-shadow:
0 8px 25px rgba(0,0,0,.35);
}

.btn:hover{
background:rgba(255,255,255,.12);
transform:translateY(-2px);
}

.section{
margin-top:36px;
}

.section h2{
font-size:20px;
margin-bottom:10px;

background:linear-gradient(90deg,#3b82f6,#06b6d4);
-webkit-background-clip:text;
color:transparent;
}

.section p{
opacity:.85;
font-size:14px;
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
margin-top:14px;
}

.card{

background:rgba(255,255,255,.08);

border-radius:12px;

border:1px solid rgba(255,255,255,.15);

backdrop-filter:blur(18px);

padding:6px;

cursor:pointer;

transition:.2s;

box-shadow:
0 8px 25px rgba(0,0,0,.35);

}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
aspect-ratio:1/1;
object-fit:cover;
border-radius:10px;
}

.card div{
font-size:12px;
margin-top:4px;
opacity:.9;
}

footer{
margin-top:48px;
text-align:center;
font-size:13px;
opacity:.7;
}

footer nav{
margin-top:10px;
display:flex;
justify-content:center;
gap:16px;
flex-wrap:wrap;
}

footer a{
color:white;
text-decoration:none;
opacity:.65;
}

footer a:hover{
opacity:1;
}

#cookieBanner{

position:fixed;

bottom:16px;

left:50%;

transform:translateX(-50%);

width:92%;

max-width:320px;

padding:14px;

border-radius:14px;

background:rgba(255,255,255,.1);

border:1px solid rgba(255,255,255,.25);

backdrop-filter:blur(16px);

text-align:center;

font-size:12px;

}

#cookieBanner button{

margin-top:8px;

padding:6px 16px;

border-radius:10px;

border:none;

background:#3b82f6;

color:white;

cursor:pointer;

}

</style>
</head>

<body>

<div class="container">

<div class="hero">

<div class="logo">
<img src="logo.png">
</div>

<h1>Prompt Gallery</h1>

<p>Browse powerful AI prompts</p>

<div class="buttons">

<button class="btn" onclick="location.href='gallery.html'">
Browse Gallery
</button>

<button class="btn" onclick="location.href='submit.html'">
Submit Prompt
</button>

</div>

</div>

<div class="section">

<h2>Featured Prompts</h2>

<p>Popular prompts from the community</p>

<div class="grid" id="featured"></div>

</div>

<footer>

<div>© 2026 Prompt Gallery</div>

<nav>

<a href="about.html">About</a>
<a href="privacy.html">Privacy</a>
<a href="terms.html">Terms</a>
<a href="contact.html">Contact</a>

</nav>

</footer>

</div>

<div id="cookieBanner">

We use cookies to improve experience.

<br>

<button onclick="acceptCookies()">OK</button>

</div>

<script>

function formatImage(url){

if(!url) return ""

let id=""

if(url.includes("open?id="))
id=url.split("open?id=")[1]

else if(url.includes("/file/d/"))
id=url.split("/file/d/")[1].split("/")[0]

if(id) return "https://lh3.googleusercontent.com/d/"+id

return url

}

async function loadFeatured(){

const sheetURL="YOUR_SHEET_API_URL"

const res=await fetch(sheetURL)

const data=await res.json()

const container=document.getElementById("featured")

container.innerHTML=""

data.slice(0,6).forEach(p=>{

let card=document.createElement("div")

card.className="card"

const img=formatImage(p["Image File"])

card.innerHTML=`
<img src="${img}">
<div>${p["Prompt Title"]}</div>
`

card.onclick=()=>{
location.href=`prompt.html?id=${p.ID}`
}

container.appendChild(card)

})

}

function acceptCookies(){
document.getElementById("cookieBanner").style.display="none"
localStorage.setItem("cookieAccepted","1")
}

if(localStorage.getItem("cookieAccepted")){
document.getElementById("cookieBanner").style.display="none"
}

loadFeatured()

</script>

</body>
</html>
