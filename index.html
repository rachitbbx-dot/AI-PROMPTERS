<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Prompt Hub</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui;
}

body{

min-height:100dvh;

display:flex;
justify-content:center;
align-items:center;

padding:20px;

background:#0f0f0f;

color:white;

overflow-y:auto;

}

/* gradient background */

body::before{

content:"";

position:fixed;
inset:0;

background:
radial-gradient(circle at 20% 30%, #4f46e5, transparent 45%),
radial-gradient(circle at 80% 70%, #06b6d4, transparent 45%),
radial-gradient(circle at 40% 80%, #4f46e5, transparent 40%);

filter:blur(120px);
opacity:.9;

z-index:-1;

}

/* container */

.container{

width:100%;
max-width:380px;

text-align:center;

background:rgba(255,255,255,0.08);

backdrop-filter:blur(50px);
-webkit-backdrop-filter:blur(50px);

border:1px solid rgba(255,255,255,0.2);

border-radius:30px;

padding:40px 26px;

box-shadow:
0 40px 100px rgba(0,0,0,.6),
inset 0 1px 0 rgba(255,255,255,.25);

}

/* profile */

.profile{

width:110px;
height:110px;

border-radius:50%;

overflow:hidden;

margin:auto;

border:2px solid rgba(255,255,255,.4);

box-shadow:0 15px 50px rgba(0,0,0,.7);

}

.profile img{

width:100%;
height:100%;
object-fit:cover;

}

/* title */

h1{

margin-top:18px;

font-size:30px;

font-weight:700;

}

.subtitle{

opacity:.7;
font-size:13px;

margin-top:4px;

margin-bottom:26px;

letter-spacing:1px;

}

/* buttons */

.glass{

display:block;

margin:14px auto;

padding:20px;

width:100%;

border-radius:60px;

border:1px solid rgba(255,255,255,.35);

background:rgba(255,255,255,.08);

font-size:17px;

color:white;

cursor:pointer;

transition:.2s;

box-shadow:
0 12px 30px rgba(0,0,0,.6),
inset 0 1px 0 rgba(255,255,255,.2);

}

.glass:active{

transform:scale(.95);

}

.btntext{

font-style:italic;

letter-spacing:1px;

}

/* footer */

.footer{

margin-top:20px;

font-size:12px;

opacity:.7;

}

/* footer links */

.footer-links{

margin-top:14px;

display:flex;

justify-content:center;

gap:16px;

flex-wrap:wrap;

font-size:12px;

}

.footer-links a{

color:white;

text-decoration:none;

opacity:.6;

transition:.2s;

}

.footer-links a:hover{

opacity:1;

}

#secretAdmin{
touch-action: manipulation;
}

</style>

</head>

<body>

<div class="container">

<div class="profile">
<img src="manav.png" id="secretAdmin">
</div>

<h1>Prompt Hub</h1>

<div class="subtitle">
THE BEST AI PROMPT PROVIDER
</div>

<button class="glass" onclick="openGallery()">
<span class="btntext">PROMPT GALLERY</span>
</button>

<button class="glass" onclick="openTools()">
<span class="btntext">BEST AI TOOLS</span>
</button>

<button class="glass" onclick="openSponsors()">
<span class="btntext">SPONSORS</span>
</button>

<div class="footer">

<div>
New prompts added daily.<br>
by RCHT & Manav
</div>

<div class="footer-links">
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
<a href="privacy.html">Privacy</a>
<a href="terms.html">Terms</a>
</div>

</div>

</div>

<script>

/* page redirects */

function openGallery(){
window.location.href="gallery.html"
}

function openTools(){
window.location.href="tools.html"
}

function openSponsors(){
window.location.href="sponsors.html"
}

/* secret admin unlock */

let tapCount = 0;

const secretImage = document.getElementById("secretAdmin");

secretImage.addEventListener("touchstart", () => {

tapCount++;

setTimeout(()=>{
tapCount = 0
},2000);

if(tapCount >= 5){

window.location.href="admin.html";

}

});

</script>

</body>
</html>
