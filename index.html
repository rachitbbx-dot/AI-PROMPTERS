<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}
body{background:#0f0f0f;color:white;padding:16px;}

/* background glow */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 30%,#4f46e5,transparent 45%),
    radial-gradient(circle at 80% 70%,#06b6d4,transparent 45%),
    radial-gradient(circle at 40% 80%,#4f46e5,transparent 40%);
  filter:blur(120px);
  opacity:.9;
  z-index:-1;
}

/* IG popup glass style */
#igPopup{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%) translateY(-20px);
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(16px);
  padding:12px 22px;
  border-radius:16px;
  color:white;
  font-weight:600;
  font-size:14px;
  opacity:0;
  transition:opacity 0.5s, transform 0.5s;
  z-index:1001;
  pointer-events:none;
}
#igPopup a{
  color:#4f46e5;
  text-decoration:none;
}

/* Random user popup */
#userPopup{
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%) translateY(40px);
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(16px);
  padding:10px 18px;
  border-radius:12px;
  font-size:13px;
  color:white;
  opacity:0;
  transition:opacity 0.4s, transform 0.4s;
  z-index:1001;
}

/* Example content layout */
.container{
  max-width:1100px;
  margin:auto;
}
header{
  text-align:center;
  margin-bottom:30px;
}
button{
  padding:10px 16px;
  border:none;
  border-radius:10px;
  background:#4f46e5;
  color:white;
  cursor:pointer;
  font-size:14px;
  margin:6px;
}
button:hover{background:#6366f1;}
</style>
</head>
<body>

<!-- IG popup -->
<div id="igPopup">
  <a href="https://www.instagram.com/made.by.manav" target="_blank">@made.by.manav</a> • Followers: 51.6K | Posts: 70
</div>

<!-- Random user popup -->
<div id="userPopup"></div>

<div class="container">
  <header>
    <h1>Welcome to AI Prompt Home</h1>
    <p>Browse latest prompts below</p>
  </header>

  <!-- Example buttons -->
  <button onclick="window.location.href='gallery.html'">Go to Gallery</button>
  <button onclick="window.location.href='prompt.html?id=0'">View a Prompt</button>
</div>

<script>
// --- IG popup ---
function showIGPopup(duration=4000){
  const popup=document.getElementById('igPopup');
  popup.style.opacity=1;
  popup.style.transform='translateX(-50%) translateY(0)';
  setTimeout(()=>{
    popup.style.opacity=0;
    popup.style.transform='translateX(-50%) translateY(-20px)';
  },duration);
}

// --- Random user popup ---
const users=["Alex","Sam","Jordan","Taylor","Morgan","Casey","Riley","Jamie","Charlie","Avery"];
const actions=["copied your prompt","liked your prompt","shared your prompt"];
function showUserPopup(){
  const popup=document.getElementById('userPopup');
  const name=users[Math.floor(Math.random()*users.length)];
  const action=actions[Math.floor(Math.random()*actions.length)];
  popup.textContent=`${name} ${action}`;
  popup.style.opacity=1;
  popup.style.transform='translateX(-50%) translateY(0)';
  setTimeout(()=>{
    popup.style.opacity=0;
    popup.style.transform='translateX(-50%) translateY(40px)';
  },3000);
}
setInterval(()=>{showUserPopup();},5000 + Math.random()*7000);

// Show IG popup once on page load
window.addEventListener("load",()=>{showIGPopup();});
</script>
</body>
</html>
