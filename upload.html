<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Prompt</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: system-ui;
}
body {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 30px 16px;
  background:
    radial-gradient(circle at 20% 30%, #4f46e5, transparent 40%),
    radial-gradient(circle at 80% 70%, #06b6d4, transparent 40%),
    #0f0f0f;
  color: white;
}

.container {
  width: 100%;
  max-width: 420px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(40px);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 32px;
  padding: 30px 22px;
  box-shadow:
    0 30px 80px rgba(0,0,0,0.5),
    inset 0 1px 0 rgba(255,255,255,0.25);
  position: relative;
}

h1 {
  text-align: center;
  margin-bottom: 25px;
  font-size: 22px;
}

label {
  font-size: 14px;
  opacity: 0.8;
}

input, textarea, select, button {
  width: 100%;
  margin-top: 6px;
  margin-bottom: 16px;
  padding: 14px;
  border-radius: 16px;
  border: none;
  font-size: 14px;
}

input, textarea, select {
  background: rgba(255,255,255,0.15);
  color: white;
}

textarea { min-height: 120px; resize: none; }

button {
  border: 1px solid rgba(255,255,255,0.35);
  background: rgba(255,255,255,0.08);
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.2s;
  border-radius: 40px;
}
button:active { transform: scale(0.96); }

/* Success tick */
#successMsg {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.85);
  padding: 20px 30px;
  border-radius: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 16px;
  color: #10b981;
  display: none;
}

.tick {
  width: 20px;
  height: 20px;
  border: 3px solid #10b981;
  border-top: none;
  border-right: none;
  transform: rotate(-45deg);
  animation: tickAnim 0.5s forwards;
}

@keyframes tickAnim {
  0% { width: 0; height: 0; opacity: 0; }
  100% { width: 20px; height: 20px; opacity: 1; }
}
</style>

</head>

<body>

<div class="container">
  <h1>Create Prompt</h1>

  <form id="promptForm" action="https://docs.google.com/forms/d/e/1FAIpQLSe9pwQgcFEtfZZJGqzLo9nRGdzkIRduJ8fTN4MBk6EdRrJp4g/formResponse" method="POST" target="_blank">

    <label>Select Image</label>
    <input type="file" id="localImage" accept="image/*">
    <input type="hidden" name="entry.1477897166" id="imageURL">

    <label>Title</label>
    <input type="text" name="entry.817927340" placeholder="Prompt title" required>

    <label>Prompt</label>
    <textarea name="entry.1564925525" placeholder="Paste full prompt" required></textarea>

    <label>Category</label>
    <select name="entry.1682741697" required>
      <option>couple</option>
      <option>male</option>
      <option>female</option>
      <option>pfp</option>
    </select>

    <label>Tags (optional)</label>
    <input type="text" name="entry.1428742015" placeholder="Comma-separated tags">

    <label>Author (optional)</label>
    <input type="text" name="entry.1343475207" placeholder="Your name">

    <label>Notes (optional)</label>
    <textarea name="entry.907377745" placeholder="Any extra notes"></textarea>

    <button type="submit">Create Prompt</button>
  </form>

  <!-- Success message -->
  <div id="successMsg"><div class="tick"></div> Prompt submitted!</div>
</div>

<script>
const fileInput = document.getElementById('localImage');
const hiddenURL = document.getElementById('imageURL');
const form = document.getElementById('promptForm');
const successMsg = document.getElementById('successMsg');

fileInput.addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const submitBtn = form.querySelector('button');
  submitBtn.disabled = true;
  submitBtn.textContent = 'Uploading Image…';

  const reader = new FileReader();
  reader.onload = async function() {
    const base64 = reader.result.split(',')[1];
    const data = new URLSearchParams();
    data.append('fileBlob', base64);
    data.append('name', file.name);
    data.append('mimeType', file.type);

    try {
      const response = await fetch('https://script.google.com/macros/s/AKfycbxudrF2HqVOq8o6G5ZtR9YLjOQkU_raiEr03PmOBK7RiLMkhfQQPPzqmGdVcKXhrUvXNQ/exec', {
        method: 'POST',
        body: data
      });

      const result = await response.json();
      if(result.url){
        hiddenURL.value = result.url;
        submitBtn.textContent = 'Create Prompt';

        // Show success message
        successMsg.style.display = 'flex';
        setTimeout(() => { successMsg.style.display = 'none'; form.reset(); }, 2500);
      } else {
        alert('Upload failed: ' + (result.error || 'Unknown'));
      }
    } catch(err) {
      alert('Upload error: ' + err.message);
    }

    submitBtn.disabled = false;
  };
  reader.readAsDataURL(file);
});
</script>

</body>
</html>
