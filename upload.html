<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Prompt</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:system-ui;
}

body{

min-height:100vh;

display:flex;
justify-content:center;

padding:30px 16px;

background:
radial-gradient(circle at 20% 30%, #4f46e5, transparent 40%),
radial-gradient(circle at 80% 70%, #06b6d4, transparent 40%),
#0f0f0f;

color:white;

}

/* container */

.container{

width:100%;
max-width:420px;

background:rgba(255,255,255,0.08);

backdrop-filter:blur(40px);

border:1px solid rgba(255,255,255,0.2);

border-radius:32px;

padding:30px 22px;

box-shadow:
0 30px 80px rgba(0,0,0,0.5),
inset 0 1px 0 rgba(255,255,255,0.25);

}

h1{

text-align:center;

margin-bottom:25px;

}

/* form elements */

label{

font-size:14px;

opacity:.8;

}

input,textarea,select{

width:100%;

margin-top:6px;

margin-bottom:16px;

padding:14px;

border-radius:16px;

border:none;

background:rgba(255,255,255,.15);

color:white;

font-size:14px;

}

textarea{

min-height:120px;

resize:none;

}

/* button */

button{

width:100%;

padding:16px;

border-radius:40px;

border:1px solid rgba(255,255,255,.35);

background:rgba(255,255,255,.08);

color:white;

font-size:16px;

cursor:pointer;

transition:.2s;

}

button:active{

transform:scale(.96);

}

</style>

</head>

<body>

<div class="container">

<h1>Create Prompt</h1>

<form>

<label>Image URL</label>
<input type="text" placeholder="paste image url">

<label>Title</label>
<input type="text" placeholder="prompt title">

<label>Prompt</label>
<textarea placeholder="paste full prompt"></textarea>

<label>Category</label>

<select>
<option>couple</option>
<option>male</option>
<option>female</option>
<option>pfp</option>
</select>

<button>Create Prompt</button>

</form>

</div>

</body>
</html>
