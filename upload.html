<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Prompt</title>

<style>
* {
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:system-ui;
}

body {
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:30px 16px;
  background:
    radial-gradient(circle at 20% 30%, #4f46e5, transparent 40%),
    radial-gradient(circle at 80% 70%, #06b6d4, transparent 40%),
    #0f0f0f;
  color:white;
}

.container {
  width:100%;
  max-width:640px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(40px);
  border:1px solid rgba(255,255,255,0.2);
  border-radius:32px;
  padding:30px 22px;
  box-shadow:
    0 30px 80px rgba(0,0,0,0.5),
    inset 0 1px 0 rgba(255,255,255,0.25);
}

h1 {
  text-align:center;
  margin-bottom:15px;
  font-size:22px;
}

button#newUploadBtn {
  display:block;
  width:150px;
  margin:0 auto 20px auto;
  padding:12px;
  border-radius:32px;
  border:1px solid rgba(255,255,255,0.35);
  background: rgba(255,255,255,0.08);
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:0.2s;
}
button#newUploadBtn:active { transform: scale(0.96); }

iframe {
  width:100%;
  height:1000px;
  border:none;
  border-radius:16px;
}
</style>

</head>

<body>

<div class="container">
  <h1>Create Prompt</h1>

  <!-- New Upload Button -->
  <button id="newUploadBtn">New Upload</button>

  <!-- Google Form Embed -->
  <iframe id="formFrame"
    src="https://docs.google.com/forms/d/e/1FAIpQLSe9pwQgcFEtfZZJGqzLo9nRGdzkIRduJ8fTN4MBk6EdRrJp4g/viewform?embedded=true"
    frameborder="0"
    marginheight="0"
    marginwidth="0">
    Loading…
  </iframe>

</div>

<script>
const newUploadBtn = document.getElementById('newUploadBtn');
const formFrame = document.getElementById('formFrame');

// Reload iframe on button click to reset form
newUploadBtn.addEventListener('click', () => {
  formFrame.src = formFrame.src;
});
</script>

</body>
</html>
