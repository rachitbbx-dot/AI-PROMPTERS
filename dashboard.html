<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui;
}

body{

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:20px;

background:
radial-gradient(circle at 20% 30%, #4f46e5, transparent 40%),
radial-gradient(circle at 80% 70%, #06b6d4, transparent 40%),
#0f0f0f;

color:white;

}

/* glass container */

.container{

width:100%;
max-width:380px;

text-align:center;

background:rgba(255,255,255,0.08);

backdrop-filter:blur(40px);

border:1px solid rgba(255,255,255,0.2);

border-radius:32px;

padding:36px 24px;

box-shadow:
0 30px 80px rgba(0,0,0,0.5),
inset 0 1px 0 rgba(255,255,255,0.25);

}

/* title */

h1{

margin-bottom:10px;

}

/* stats */

.stats{

font-size:14px;

opacity:.75;

margin-bottom:26px;

}

/* buttons */

.glass{

display:block;

margin:12px auto;

padding:18px;

width:100%;

border-radius:40px;

border:1px solid rgba(255,255,255,.35);

background:rgba(255,255,255,.08);

color:white;

font-size:16px;

cursor:pointer;

transition:.2s;

}

.glass:active{

transform:scale(.95);

}

/* logout */

.logout{

margin-top:16px;

font-size:13px;

opacity:.6;

cursor:pointer;

}

</style>

</head>

<body>

<div class="container">

<h1>Admin Dashboard</h1>

<div class="stats">
Total Prompts: <span id="count">Loading...</span>
</div>

<button class="glass" onclick="uploadPrompt()">
Upload Prompt
</button>

<button class="glass" onclick="openSheet()">
Prompt Database
</button>

<button class="glass" onclick="openResponses()">
View Form Responses
</button>

<button class="glass">
Admin Tools (coming later)
</button>

<div class="logout" onclick="logout()">
Logout
</div>

</div>

<script>

/* PROTECT DASHBOARD */

if(sessionStorage.getItem("admin") !== "true"){
window.location.href="index.html"
}

/* COUNT PROMPTS */

fetch("https://script.google.com/macros/s/AKfycbx4XOgMkg1KE5b0xEfNzx9RF2hQa2GZ-O9S3I95w_UFSjYC8RhGKIT5AMeUPvRFBBmx/exec")
.then(res=>res.json())
.then(data=>{
document.getElementById("count").textContent=data.length
})
.catch(()=>{
document.getElementById("count").textContent="error"
})

/* BUTTON ACTIONS */

function uploadPrompt(){

window.open(
"https://docs.google.com/forms/d/e/1FAIpQLSe9pwQgcFEtfZZJGqzLo9nRGdzkIRduJ8fTN4MBk6EdRrJp4g/viewform",
"_blank"
)

}

function openSheet(){

window.open(
"https://docs.google.com/spreadsheets/d/1Hp4lxp8PK-UWNzAMPj1c_jb_99BiIk0YTmU88D1pOiY",
"_blank"
)

}

function openResponses(){

window.open(
"https://docs.google.com/forms/d/e/1FAIpQLSe9pwQgcFEtfZZJGqzLo9nRGdzkIRduJ8fTN4MBk6EdRrJp4g/viewanalytics",
"_blank"
)

}

function logout(){

sessionStorage.removeItem("admin")

window.location.href="index.html"

}

</script>

</body>
</html>
