<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Prompt</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui;
}

body{
background:#0f0f0f;
color:white;
padding:20px;
}

/* background */

body::before{
content:"";
position:fixed;
inset:0;

background:
radial-gradient(circle at 20% 30%, #4f46e5, transparent 45%),
radial-gradient(circle at 80% 70%, #06b6d4, transparent 45%);

filter:blur(120px);
opacity:.9;
z-index:-1;
}

.container{
max-width:700px;
margin:auto;
}

.back{
margin-bottom:20px;
cursor:pointer;
opacity:.7;
}

/* post card */

.card{
background:rgba(255,255,255,.08);
border-radius:20px;
overflow:hidden;
border:1px solid rgba(255,255,255,.2);
margin-bottom:30px;
}

.card img{
width:100%;
display:block;
}

.content{
padding:18px;
}

.title{
font-size:22px;
font-weight:600;
margin-bottom:10px;
}

.meta{
opacity:.7;
font-size:13px;
margin-bottom:14px;
}

.notes{
margin-bottom:20px;
line-height:1.5;
}

/* locked prompt */

.promptBox{
background:rgba(0,0,0,.35);
border-radius:14px;
padding:20px;
text-align:center;
}

.lockIcon{
font-size:22px;
margin-bottom:8px;
opacity:.7;
}

.unlockBtn{
margin-top:10px;
padding:10px 20px;
border-radius:30px;
border:none;
background:#4f46e5;
color:white;
cursor:pointer;
}

.countdown{
margin-top:8px;
opacity:.7;
font-size:13px;
}

/* prompt text */

.promptText{
display:none;
white-space:pre-wrap;
line-height:1.6;
text-align:left;
}

/* copy */

.copyBtn{
display:none;
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:30px;
background:#06b6d4;
color:white;
cursor:pointer;
}

/* related */

.relatedTitle{
margin:30px 0 14px;
font-size:18px;
}

.relatedGrid{
column-count:2;
column-gap:14px;
}

.relatedCard{
break-inside:avoid;
margin-bottom:14px;
background:rgba(255,255,255,.08);
border-radius:16px;
overflow:hidden;
cursor:pointer;
}

.relatedCard img{
width:100%;
display:block;
}

.relatedCard div{
padding:8px;
font-size:13px;
}

</style>

</head>

<body>

<div class="container">

<div class="back" onclick="history.back()">← Back</div>

<div class="card">

<img id="image">

<div class="content">

<div class="title" id="title"></div>

<div class="meta" id="meta"></div>

<div class="notes" id="notes"></div>

<div class="promptBox" id="promptBox">

<div class="lockIcon">🔒 Prompt Locked</div>

<div class="promptText" id="promptText"></div>

<button class="unlockBtn" onclick="startUnlock()" id="unlockBtn">
Unlock Prompt
</button>

<div class="countdown" id="countdown"></div>

<button class="copyBtn" id="copyBtn" onclick="copyPrompt()">
Copy Prompt
</button>

</div>

</div>

</div>

<div class="relatedTitle">Related Prompts</div>
<div class="relatedGrid" id="related"></div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbx4XOgMkg1KE5b0xEfNzx9RF2hQa2GZ-O9S3I95w_UFSjYC8RhGKIT5AMeUPvRFBBmx/exec"

const params=new URLSearchParams(window.location.search)
const id=parseInt(params.get("id"))

let prompts=[]
let promptData


/* DRIVE IMAGE FIX */

function formatImage(url){

if(!url) return ""

let id=""

if(url.includes("open?id=")){
id=url.split("open?id=")[1]
}

else if(url.includes("/file/d/")){
id=url.split("/file/d/")[1].split("/")[0]
}

if(id){
return "https://lh3.googleusercontent.com/d/"+id
}

return url

}


/* LOAD */

fetch(API)
.then(res=>res.json())
.then(data=>{

prompts=data

promptData=prompts[id]

document.getElementById("title").innerText=
promptData["Prompt Title"]

document.getElementById("image").src=
formatImage(promptData["Image File"])

document.getElementById("notes").innerText=
promptData["Notes"] || ""

document.getElementById("meta").innerText=
"Category: "+promptData["Category"]+
" • Author: "+promptData["Author"]

renderRelated()

})


/* UNLOCK */

function startUnlock(){

let seconds=5

const countdown=document.getElementById("countdown")

countdown.innerText="Unlocking in "+seconds+"..."

const timer=setInterval(()=>{

seconds--

countdown.innerText="Unlocking in "+seconds+"..."

if(seconds<=0){

clearInterval(timer)

unlockPrompt()

}

},1000)

}


function unlockPrompt(){

document.getElementById("unlockBtn").style.display="none"
document.getElementById("countdown").style.display="none"

const promptText=document.getElementById("promptText")

promptText.style.display="block"

promptText.innerText=promptData["Prompt Text"]

document.getElementById("copyBtn").style.display="inline-block"

}


/* COPY */

function copyPrompt(){

navigator.clipboard.writeText(promptData["Prompt Text"])

alert("Prompt copied!")

}


/* RELATED */

function renderRelated(){

const related=document.getElementById("related")

const shuffled=[...prompts].sort(()=>Math.random()-0.5)

const selected=shuffled.slice(0,6)

selected.forEach(p=>{

const card=document.createElement("div")

card.className="relatedCard"

card.onclick=()=>{
window.location.href=`prompt.html?id=${prompts.indexOf(p)}`
}

card.innerHTML=`

<img src="${formatImage(p["Image File"])}">
<div>${p["Prompt Title"]}</div>

`

related.appendChild(card)

})

}

</script>

</body>
</html>
