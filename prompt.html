<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Viewer</title>

<style>

body{
background:#0f0f0f;
color:white;
font-family:system-ui;
padding:20px;
max-width:800px;
margin:auto;
position:relative;
}

body::before{
content:"";
position:fixed;
inset:0;

background:
radial-gradient(circle at 20% 30%, #4f46e5, transparent 45%),
radial-gradient(circle at 80% 70%, #06b6d4, transparent 45%),
radial-gradient(circle at 40% 80%, #4f46e5, transparent 40%);

filter:blur(120px);
opacity:.9;
z-index:-1;
}

/* Unlock overlay */

#unlockOverlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.75);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:1000;
backdrop-filter: blur(4px);
border-radius:15px;
}

#progressContainer{
width:300px;
height:20px;
background:rgba(255,255,255,0.1);
border-radius:15px;
backdrop-filter: blur(8px);
box-shadow: 0 0 10px rgba(255,255,255,0.2) inset;
overflow:hidden;
position:relative;
margin-top:10px;
}

#progress{
width:0%;
height:100%;
background:linear-gradient(90deg, #fffa, #4f46e5);
box-shadow: 0 0 12px #4f46e5, 0 0 20px #4f46e5 inset;
border-radius:15px;
}

img#promptImage{
width:100%;
border-radius:20px;
margin-bottom:15px;
object-fit:cover;
}

h1{
font-size:22px;
margin-bottom:10px;
}

#content{
background:rgba(255,255,255,0.05);
padding:15px;
border-radius:10px;
white-space:pre-wrap;
margin-top:10px;
}

button{
padding:10px 15px;
border:none;
border-radius:10px;
background:#4f46e5;
color:white;
cursor:pointer;
font-size:14px;
margin-bottom:10px;
}

button:hover{
background:#6366f1;
}

.loader{
text-align:center;
margin-top:50px;
opacity:.6;
}

/* SEO SECTION */

#seoSection{
margin-top:30px;
padding:18px;
background:rgba(255,255,255,0.05);
border-radius:12px;
line-height:1.6;
font-size:14px;
}

#seoSection h2{
font-size:18px;
margin-bottom:10px;
}

</style>

</head>

<body>

<div id="unlockOverlay">

<div>Unlocking prompt...</div>

<div id="progressContainer">
<div id="progress"></div>
</div>

</div>

<img id="promptImage" src="" alt="Prompt Image" style="display:none;">

<h1 id="title" style="display:none;">Loading...</h1>

<button id="copyBtn" style="display:none;">Copy Prompt</button>

<div id="content" style="display:none;"></div>

<div class="loader" id="loader" style="display:none;">Loading...</div>

<!-- SEO TEXT SECTION -->

<div id="seoSection" style="display:none;">

<h2>About This AI Prompt</h2>
<p id="seoExplain"></p>

<h2>Tips For Best Results</h2>
<p id="seoTips"></p>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbx4XOgMkg1KE5b0xEfNzx9RF2hQa2GZ-O9S3I95w_UFSjYC8RhGKIT5AMeUPvRFBBmx/exec";

// CSV files
const EXPLAIN_CSV = "/content/explanations.csv";
const TIPS_CSV = "/content/tips.csv";

// Get the ID from URL

const params = new URLSearchParams(window.location.search);
const id = parseInt(params.get("id"));

// Elements

const titleEl = document.getElementById("title");
const contentEl = document.getElementById("content");
const loaderEl = document.getElementById("loader");
const copyBtn = document.getElementById("copyBtn");
const imgEl = document.getElementById("promptImage");

const overlay = document.getElementById("unlockOverlay");
const progressEl = document.getElementById("progress");

const seoSection = document.getElementById("seoSection");
const seoExplain = document.getElementById("seoExplain");
const seoTips = document.getElementById("seoTips");

// Format Google Drive images

function formatImage(url){

if(!url) return "";

let id="";

if(url.includes("open?id=")){
id=url.split("open?id=")[1];
}
else if(url.includes("/file/d/")){
id=url.split("/file/d/")[1].split("/")[0];
}

if(id){
return "https://lh3.googleusercontent.com/d/"+id;
}

return url;

}

// CSV loader

async function loadCSV(url){

const res = await fetch(url);
const text = await res.text();

return text.split("\n").filter(x=>x.trim()!="");

}

// Random item

function randomItem(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

// Fetch prompts

let promptData;

fetch(API)
.then(res=>res.json())
.then(data=>{

promptData = data[id];

startUnlock();

})
.catch(err=>{

overlay.innerHTML = "Error loading prompt";
console.error(err);

});

// Unlock mechanic

function startUnlock(){

let width = 0;
const target = 100;
const duration = 5000;
const interval = 50;

const steps = duration / interval;

let currentStep = 0;

const progressInterval = setInterval(()=>{

const randomIncrement = (target/steps) * (0.5 + Math.random());

width += randomIncrement;

if(width > target) width = target;

progressEl.style.width = width + "%";

currentStep++;

if(width >= target || currentStep >= steps*2){

clearInterval(progressInterval);

showPrompt();

}

}, interval);

}

// Show prompt

async function showPrompt(){

overlay.style.display = "none";

if(!promptData){

titleEl.textContent = "Prompt not found";
return;

}

titleEl.style.display = "block";
contentEl.style.display = "block";
copyBtn.style.display = "inline-block";

imgEl.style.display = promptData["Image File"] ? "block" : "none";

titleEl.textContent = promptData["Prompt Title"] || "Untitled";

contentEl.textContent = promptData["Prompt Text"] || "";

imgEl.src = formatImage(promptData["Image File"]) || "";

// Load SEO text

const explainList = await loadCSV(EXPLAIN_CSV);
const tipsList = await loadCSV(TIPS_CSV);

seoExplain.textContent = randomItem(explainList);
seoTips.textContent = randomItem(tipsList);

seoSection.style.display = "block";

}

// Copy button

copyBtn.addEventListener("click", ()=>{

navigator.clipboard.writeText(contentEl.textContent).then(()=>{

copyBtn.textContent = "Copied!";

setTimeout(()=> copyBtn.textContent = "Copy Prompt",1500);

});

});

</script>

</body>
</html>
