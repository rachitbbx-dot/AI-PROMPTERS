<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Viewer</title>

<style>
*{box-sizing:border-box;}
html,body{max-width:100%;overflow-x:hidden;}

body{
background:#0f0f0f;
color:white;
font-family:system-ui;
padding:20px;
max-width:800px;
margin:auto;
position:relative;
}

body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 30%, #4f46e5, transparent 45%),
radial-gradient(circle at 80% 70%, #06b6d4, transparent 45%),
radial-gradient(circle at 40% 80%, #4f46e5, transparent 40%);
filter:blur(120px);
opacity:.9;
z-index:-1;
}

.ad-center{
display:flex;
justify-content:center;
align-items:center;
margin:20px 0;
max-width:100%;
overflow:hidden;
}

.ad-728{
width:100%;
display:flex;
justify-content:center;
margin-top:40px;
}

@media (max-width:768px){
.ad-728{display:none;}
.ad-320{display:flex; position:fixed; bottom:0; left:50%; transform:translateX(-50%); margin:0; z-index:9999;}
}
.ad-320{display:none;}

#igPopup{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%) translateY(-20px);
background:rgba(255,255,255,0.1);
backdrop-filter:blur(16px);
padding:12px 22px;
border-radius:16px;
color:white;
font-weight:600;
font-size:14px;
opacity:0;
transition:opacity .5s, transform .5s;
z-index:1001;
pointer-events:none;
}

#unlockOverlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.75);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:1000;
backdrop-filter:blur(4px);
}

#unlockMessage{
color:white;
font-size:14px;
font-weight:500;
margin-bottom:10px;
text-align:center;
}

.unlockAdWrap{
position:relative;
width:300px;
height:250px;
margin-top:15px;
}

.unlockAd{
position:absolute;
inset:0;
z-index:1;
}

#unlockBtn{
position:absolute;
inset:0;
z-index:2;
background:rgba(0,0,0,0.6);
border:0;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
font-weight:600;
color:white;
font-size:16px;
}

#unlockBtn span{
background:#4f46e5;
padding:10px 18px;
border-radius:10px;
}

#progressContainer{
width:300px;
height:20px;
background:rgba(255,255,255,0.1);
border-radius:15px;
overflow:hidden;
margin-top:10px;
}

#progress{
width:0%;
height:100%;
background:linear-gradient(90deg,#fffa,#4f46e5);
}

img#promptImage{
width:100%;
border-radius:20px;
margin-bottom:15px;
object-fit:cover;
}

h1{font-size:22px;margin-bottom:10px;}

#content{
background:rgba(255,255,255,0.05);
padding:15px;
border-radius:10px;
white-space:pre-wrap;
margin-top:10px;
}

button{
padding:10px 15px;
border:none;
border-radius:10px;
background:#4f46e5;
color:white;
cursor:pointer;
font-size:14px;
margin-bottom:10px;
}

button:hover{background:#6366f1;}

.loader{text-align:center;margin-top:50px;opacity:.6;}

#seoSection{
margin-top:30px;
padding:18px;
background:rgba(255,255,255,0.05);
border-radius:12px;
line-height:1.6;
font-size:14px;
}

#morePrompts{margin-top:40px;}

#moreGrid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:15px;
}

.promptCard{
background:rgba(255,255,255,0.05);
border-radius:12px;
padding:10px;
cursor:pointer;
transition:.2s;
}

.promptCard:hover{
transform:scale(1.05);
background:rgba(255,255,255,0.08);
}

.promptCard img{
width:100%;
border-radius:8px;
margin-bottom:6px;
object-fit:cover;
}

footer{
margin-top:60px;
padding-top:25px;
border-top:1px solid rgba(255,255,255,0.1);
text-align:center;
font-size:13px;
opacity:.8;
}
</style>
</head>

<body>

<div id="igPopup">
<a href="https://www.instagram.com/made.by.manav" target="_blank">@made.by.manav</a> • Followers: 51.6K | Posts: 70
</div>

<div id="unlockOverlay">

<div id="unlockMessage">
Tap the unlock button to open a short sponsor page.<br>
After redirect, return here to claim your free prompt.
</div>

</script>
<script src="https://www.highperformanceformat.com/03441af9d7c950c75c0b698da8e3a00c/invoke.js"></script>
</div>

</div>

<div id="progressContainer">
<div id="progress"></div>
</div>

</div>

<img id="promptImage" src="" alt="Prompt Image" style="display:none;">
<h1 id="title" style="display:none;"></h1>
<button id="copyBtn" style="display:none;">Copy Prompt</button>
<div id="content" style="display:none;"></div>
<button id="expandBtn" style="display:none;">Show More</button>
<div class="loader" id="loader" style="display:none;">Loading...</div>

<div id="seoSection" style="display:none;">
<h2>About This AI Prompt</h2>

<h2>Tips For Best Results</h2>
<p id="seoTips"></p>
</div>

<div id="morePrompts" style="display:none;">
<h2>More Prompts</h2>
<div id="moreGrid"></div>
</div>

<div class="ad-center ad-728">

</div>

<footer>
<div>New prompts added daily.</div>
<div>by RCHT & Manav</div>
</footer>

</body>
</html>
