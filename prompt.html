.promptCard img{

<script>

let adTriggered=false;

function triggerAd(){

if(adTriggered) return;

const ok=confirm(
"You will be redirected to an ad to unlock this prompt.\n\nAfter it opens, return to this page to copy your prompt."
);

if(!ok) return;

const s=document.createElement("script");
s.src="https://pl29033403.profitablecpmratenetwork.com/c7/58/83/c7588384a025a5f208695da76567edd6.js";
document.body.appendChild(s);

adTriggered=true;

}

const API="https://script.google.com/macros/s/AKfycbx4XOgMkg1KE5b0xEfNzx9RF2hQa2GZ-O9S3I95w_UFSjYC8RhGKIT5AMeUPvRFBBmx/exec";

const params=new URLSearchParams(window.location.search);
const id=parseInt(params.get("id"));

const titleEl=document.getElementById("title");
const contentEl=document.getElementById("content");
const copyBtn=document.getElementById("copyBtn");
const imgEl=document.getElementById("promptImage");
const expandBtn=document.getElementById("expandBtn");

const overlay=document.getElementById("unlockOverlay");
const progressEl=document.getElementById("progress");

let allPrompts;
let fullPrompt="";
let expanded=false;

fetch(API)
.then(res=>res.json())
.then(data=>{
allPrompts=data;
startUnlock();
});

function startUnlock(){

triggerAd();

let width=0;

const interval=setInterval(()=>{

width+=Math.random()*4;

if(width>100) width=100;

progressEl.style.width=width+"%";

if(width>=100){
clearInterval(interval);
showPrompt();
}

},80);

}

function showPrompt(){

overlay.style.display="none";

const p=allPrompts[id];

titleEl.textContent=p["Prompt Title"];
fullPrompt=p["Prompt Text"];

titleEl.style.display="block";
contentEl.style.display="block";
copyBtn.style.display="inline-block";

const words=fullPrompt.split(" ");

if(words.length>20){
contentEl.textContent=words.slice(0,20).join(" ")+"...";
expandBtn.style.display="inline-block";
}else{
contentEl.textContent=fullPrompt;
}

imgEl.src=p["Image File"];
imgEl.style.display="block";

}

expandBtn.onclick=()=>{

if(!expanded){
contentEl.textContent=fullPrompt;
expandBtn.textContent="Show Less";
expanded=true;
}else{
const words=fullPrompt.split(" ");
contentEl.textContent=words.slice(0,20).join(" ")+"...";
expandBtn.textContent="Show More";
expanded=false;
}

};

copyBtn.onclick=()=>{

navigator.clipboard.writeText(fullPrompt);

copyBtn.textContent="Copied!";

setTimeout(()=>copyBtn.textContent="Copy Prompt",1500);

};

function showIGPopup(){

const popup=document.getElementById("igPopup");

popup.style.opacity=1;
popup.style.transform="translateX(-50%) translateY(0)";

setTimeout(()=>{
popup.style.opacity=0;
popup.style.transform="translateX(-50%) translateY(-20px)";
},4000);

}

window.onload=showIGPopup;

</script>
