<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Viewer</title>

<style>
*{box-sizing:border-box;}

html,body{max-width:100%;overflow-x:hidden;}

body{
background:#0f0f0f;
color:white;
font-family:system-ui;
padding:20px;
max-width:800px;
margin:auto;
position:relative;
}

body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 30%, #4f46e5, transparent 45%),
radial-gradient(circle at 80% 70%, #06b6d4, transparent 45%),
radial-gradient(circle at 40% 80%, #4f46e5, transparent 40%);
filter:blur(120px);
opacity:.9;
z-index:-1;
}

.ad-center{
display:flex;
justify-content:center;
align-items:center;
margin:20px 0;
max-width:100%;
overflow:hidden;
}

.ad-728{
width:100%;
display:flex;
justify-content:center;
}

@media (max-width:768px){
.ad-728{display:none;}
}

#igPopup{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%) translateY(-20px);
background:rgba(255,255,255,0.1);
backdrop-filter:blur(16px);
padding:12px 22px;
border-radius:16px;
color:white;
font-weight:600;
font-size:14px;
opacity:0;
transition:opacity 0.5s, transform 0.5s;
z-index:1001;
pointer-events:none;
}

#igPopup a{
color:#4f46e5;
text-decoration:none;
}

#unlockOverlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.75);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:1000;
backdrop-filter: blur(4px);
border-radius:15px;
}

#progressContainer{
width:300px;
height:20px;
background:rgba(255,255,255,0.1);
border-radius:15px;
overflow:hidden;
margin-top:10px;
}

#progress{
width:0%;
height:100%;
background:linear-gradient(90deg,#fffa,#4f46e5);
border-radius:15px;
}

img#promptImage{
width:100%;
border-radius:20px;
margin-bottom:15px;
object-fit:cover;
}

h1{
font-size:22px;
margin-bottom:10px;
}

#content{
background:rgba(255,255,255,0.05);
padding:15px;
border-radius:10px;
white-space:pre-wrap;
margin-top:10px;
}

#expandBtn{
margin-top:8px;
font-size:13px;
background:transparent;
color:#8ab4ff;
border:none;
cursor:pointer;
}

button{
padding:10px 15px;
border:none;
border-radius:10px;
background:#4f46e5;
color:white;
cursor:pointer;
font-size:14px;
margin-bottom:10px;
}

button:hover{background:#6366f1;}

.loader{
text-align:center;
margin-top:50px;
opacity:.6;
}

#seoSection{
margin-top:30px;
padding:18px;
background:rgba(255,255,255,0.05);
border-radius:12px;
line-height:1.6;
font-size:14px;
}

#seoSection h2{
font-size:18px;
margin-bottom:10px;
}

#morePrompts{margin-top:40px;}

#moreGrid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:15px;
}

.promptCard{
background:rgba(255,255,255,0.05);
border-radius:12px;
padding:10px;
cursor:pointer;
transition:.2s;
}

.promptCard:hover{
transform:scale(1.05);
background:rgba(255,255,255,0.08);
}

.promptCard img{
width:100%;
border-radius:8px;
margin-bottom:6px;
object-fit:cover;
}

.promptCard div{
font-size:13px;
opacity:.9;
}

footer{
margin-top:60px;
padding-top:25px;
border-top:1px solid rgba(255,255,255,0.1);
text-align:center;
font-size:13px;
opacity:.8;
}

footer nav{margin-top:10px;}

footer a{
color:#aaa;
margin:0 8px;
text-decoration:none;
}

footer a:hover{color:white;}
</style>
</head>

<body>

<div id="igPopup">
<a href="https://www.instagram.com/made.by.manav" target="_blank">@made.by.manav</a> • Followers: 51.6K | Posts: 70
</div>

<div id="unlockOverlay">
<div>Unlocking prompt...</div>
<div id="progressContainer">
<div id="progress"></div>
</div>
</div>

<!-- POPUNDER -->
<script src="https://pl29033356.profitablecpmratenetwork.com/66/35/13/663513085ca9542f459ee6ffb4d20754.js"></script>

<!-- SOCIAL BAR -->
<script src="https://pl29033403.profitablecpmratenetwork.com/c7/58/83/c7588384a025a5f208695da76567edd6.js"></script>

<img id="promptImage" src="" alt="Prompt Image" style="display:none;">
<h1 id="title" style="display:none;">Loading...</h1>
<button id="copyBtn" style="display:none;">Copy Prompt</button>
<div id="content" style="display:none;"></div>
<button id="expandBtn" style="display:none;">Show More</button>

<script>
const API="https://script.google.com/macros/s/AKfycbx4XOgMkg1KE5b0xEfNzx9RF2hQa2GZ-O9S3I95w_UFSjYC8RhGKIT5AMeUPvRFBBmx/exec";
const EXPLAIN_CSV="/content/explanations.csv";
const TIPS_CSV="/content/tips.csv";

const params=new URLSearchParams(window.location.search);
const id=parseInt(params.get("id"));

const titleEl=document.getElementById("title");
const contentEl=document.getElementById("content");
const copyBtn=document.getElementById("copyBtn");
const imgEl=document.getElementById("promptImage");
const expandBtn=document.getElementById("expandBtn");

const overlay=document.getElementById("unlockOverlay");
const progressEl=document.getElementById("progress");

let allPrompts;
let fullPrompt="";
let expanded=false;
let adsTriggered=false;

function triggerUnlockAds(){

if(adsTriggered) return;
adsTriggered=true;

const userConfirm=confirm(
"To unlock this prompt an ad will open in another window.\n\nReturn to this page afterwards to claim your free prompt."
);

if(userConfirm){

let s=document.createElement("script");
s.src="https://pl29033403.profitablecpmratenetwork.com/c7/58/83/c7588384a025a5f208695da76567edd6.js";
document.body.appendChild(s);

let p=document.createElement("script");
p.src="https://pl29033356.profitablecpmratenetwork.com/66/35/13/663513085ca9542f459ee6ffb4d20754.js";
document.body.appendChild(p);

}

}

fetch(API)
.then(res=>res.json())
.then(data=>{
allPrompts=data;
startUnlock();
});

function startUnlock(){

triggerUnlockAds();

let width=0;
const duration=5000;
const interval=50;
const steps=duration/interval;
let currentStep=0;

const progressInterval=setInterval(()=>{
const randomIncrement=(100/steps)*(0.5+Math.random());
width+=randomIncrement;
if(width>100) width=100;

progressEl.style.width=width+"%";
currentStep++;

if(width>=100){
clearInterval(progressInterval);
showPrompt();
}

},interval);

}

function showPrompt(){

overlay.style.display="none";

const promptData=allPrompts[id];
if(!promptData) return;

titleEl.style.display="block";
contentEl.style.display="block";
copyBtn.style.display="inline-block";

titleEl.textContent=promptData["Prompt Title"]||"Untitled";
fullPrompt=promptData["Prompt Text"]||"";

contentEl.textContent=fullPrompt;

}

copyBtn.addEventListener("click",()=>{
navigator.clipboard.writeText(fullPrompt);
copyBtn.textContent="Copied!";
setTimeout(()=>copyBtn.textContent="Copy Prompt",1500);
});
</script>

</body>
</html>
