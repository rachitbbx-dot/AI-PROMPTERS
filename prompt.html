<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Prompt</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui;
}

body{
background:#0f0f0f;
color:white;
padding:20px;
}

/* background */

body::before{
content:"";
position:fixed;
inset:0;

background:
radial-gradient(circle at 20% 30%, #4f46e5, transparent 45%),
radial-gradient(circle at 80% 70%, #06b6d4, transparent 45%);

filter:blur(120px);
opacity:.9;
z-index:-1;
}

/* container */

.container{
max-width:700px;
margin:auto;
}

/* back button */

.back{
margin-bottom:20px;
cursor:pointer;
opacity:.7;
}

/* card */

.card{
background:rgba(255,255,255,.08);
border-radius:20px;
overflow:hidden;
border:1px solid rgba(255,255,255,.2);
}

.card img{
width:100%;
display:block;
}

.title{
padding:16px;
font-size:20px;
font-weight:600;
}

/* unlock section */

.unlockBox{
padding:20px;
text-align:center;
}

button{
padding:12px 24px;
border-radius:30px;
border:none;
background:#4f46e5;
color:white;
cursor:pointer;
font-size:15px;
}

/* prompt text */

.prompt{
display:none;
padding:20px;
white-space:pre-wrap;
line-height:1.6;
background:rgba(0,0,0,.3);
}

/* copy button */

.copyBtn{
margin:20px;
display:none;
}

.countdown{
margin-top:10px;
opacity:.7;
}

</style>

</head>

<body>

<div class="container">

<div class="back" onclick="history.back()">← Back</div>

<div class="card">

<img id="image">

<div class="title" id="title"></div>

<div class="unlockBox" id="unlockBox">

<button onclick="startUnlock()">Unlock Prompt</button>

<div class="countdown" id="countdown"></div>

</div>

<div class="prompt" id="promptText"></div>

<button class="copyBtn" id="copyBtn" onclick="copyPrompt()">Copy Prompt</button>

</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbx4XOgMkg1KE5b0xEfNzx9RF2hQa2GZ-O9S3I95w_UFSjYC8RhGKIT5AMeUPvRFBBmx/exec"

const params=new URLSearchParams(window.location.search)
const id=params.get("id")

let promptData


/* GOOGLE DRIVE IMAGE FIX */

function formatImage(url){

if(!url) return ""

let id=""

if(url.includes("open?id=")){
id=url.split("open?id=")[1]
}

else if(url.includes("/file/d/")){
id=url.split("/file/d/")[1].split("/")[0]
}

if(id){
return "https://lh3.googleusercontent.com/d/"+id
}

return url

}


/* LOAD PROMPT */

fetch(API)
.then(res=>res.json())
.then(data=>{

const list=data

promptData=list[id]

document.getElementById("title").innerText=promptData["Prompt Title"]

document.getElementById("image").src=
formatImage(promptData["Image File"])

})


/* UNLOCK COUNTDOWN */

function startUnlock(){

let seconds=5

const countdown=document.getElementById("countdown")

countdown.innerText="Unlocking in "+seconds+"..."

const timer=setInterval(()=>{

seconds--

countdown.innerText="Unlocking in "+seconds+"..."

if(seconds<=0){

clearInterval(timer)

unlockPrompt()

}

},1000)

}


function unlockPrompt(){

document.getElementById("unlockBox").style.display="none"

document.getElementById("promptText").style.display="block"

document.getElementById("copyBtn").style.display="block"

document.getElementById("promptText").innerText=
promptData["Prompt Text"]

}


/* COPY */

function copyPrompt(){

navigator.clipboard.writeText(promptData["Prompt Text"])

alert("Prompt copied!")

}

</script>

</body>
</html>
