<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Prompt</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui;
}

body{

background:#0f0f0f;
color:white;

padding:20px;

}

/* background */

body::before{

content:"";
position:fixed;
inset:0;

background:
radial-gradient(circle at 20% 30%, #4f46e5, transparent 45%),
radial-gradient(circle at 80% 70%, #06b6d4, transparent 45%),
radial-gradient(circle at 40% 80%, #4f46e5, transparent 40%);

filter:blur(120px);
opacity:.9;
z-index:-1;

}

/* container */

.container{

max-width:900px;
margin:auto;

}

/* back button */

.back{

margin-bottom:18px;

cursor:pointer;

opacity:.8;

}

/* image */

.image{

width:100%;
border-radius:20px;

margin-bottom:18px;

}

/* title */

.title{

font-size:22px;

margin-bottom:16px;

}

/* unlock */

.unlock{

padding:14px 24px;

border-radius:30px;

border:none;

background:#4f46e5;

color:white;

font-size:15px;

cursor:pointer;

margin-bottom:20px;

}

/* prompt text */

.prompt{

background:rgba(255,255,255,.08);

border-radius:20px;

padding:18px;

margin-bottom:16px;

display:none;

}

/* copy */

.copy{

padding:10px 20px;

border-radius:30px;

border:none;

background:#06b6d4;

color:white;

cursor:pointer;

}

/* suggestions */

.suggestions{

margin-top:40px;

}

.grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(200px,1fr));

gap:14px;

margin-top:14px;

}

.card{

background:rgba(255,255,255,.08);

border-radius:16px;

overflow:hidden;

cursor:pointer;

}

.card img{

width:100%;
height:150px;
object-fit:cover;

}

.cardTitle{

padding:10px;
font-size:14px;

}

</style>

</head>

<body>

<div class="container">

<div class="back" onclick="goBack()">← Back</div>

<img id="image" class="image">

<div id="title" class="title"></div>

<button class="unlock" onclick="unlockPrompt()">
Unlock Prompt
</button>

<div id="prompt" class="prompt"></div>

<button id="copyBtn" class="copy" style="display:none" onclick="copyPrompt()">
Copy Prompt
</button>

<div class="suggestions">

<h3>More Prompts</h3>

<div id="suggestions" class="grid"></div>

</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbx4XOgMkg1KE5b0xEfNzx9RF2hQa2GZ-O9S3I95w_UFSjYC8RhGKIT5AMeUPvRFBBmx/exec"

const urlParams=new URLSearchParams(window.location.search)

const id=urlParams.get("id")

let prompts=[]
let currentPrompt=null

fetch(API)
.then(res=>res.json())
.then(data=>{

prompts=data.reverse()

currentPrompt=prompts[id]

loadPrompt()

loadSuggestions()

})

function loadPrompt(){

document.getElementById("image").src=currentPrompt["Image File"]

document.getElementById("title").textContent=currentPrompt["Prompt Title"]

document.getElementById("prompt").textContent=currentPrompt["Prompt Text"]

}

function unlockPrompt(){

document.getElementById("prompt").style.display="block"

document.getElementById("copyBtn").style.display="inline-block"

}

function copyPrompt(){

navigator.clipboard.writeText(currentPrompt["Prompt Text"])

alert("Prompt copied")

}

function goBack(){

window.history.back()

}

/* suggestions */

function loadSuggestions(){

const box=document.getElementById("suggestions")

const category=currentPrompt["Category"]

const similar=prompts.filter(p=>p["Category"]===category)

similar.slice(0,6).forEach((p,i)=>{

const card=document.createElement("div")

card.className="card"

card.onclick=()=>{

window.location.href=`prompt.html?id=${i}`

}

card.innerHTML=`

<img src="${p['Image File']}">

<div class="cardTitle">${p['Prompt Title']}</div>

`

box.appendChild(card)

})

}

</script>

</body>
</html>
