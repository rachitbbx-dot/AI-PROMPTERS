<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Prompt Viewer</title>

<style>

body{
background:#0f0f0f;
color:white;
font-family:system-ui;
padding:20px;
max-width:800px;
margin:auto;
position:relative;
}

body::before{
content:"";
position:fixed;
inset:0;

background:
radial-gradient(circle at 20% 30%, #4f46e5, transparent 45%),
radial-gradient(circle at 80% 70%, #06b6d4, transparent 45%),
radial-gradient(circle at 40% 80%, #4f46e5, transparent 40%);

filter:blur(120px);
opacity:.9;
z-index:-1;
}

/* Unlock overlay */

#unlockOverlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.75);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:1000;
backdrop-filter: blur(4px);
border-radius:15px;
}

#progressContainer{
width:300px;
height:20px;
background:rgba(255,255,255,0.1);
border-radius:15px;
overflow:hidden;
margin-top:10px;
}

#progress{
width:0%;
height:100%;
background:linear-gradient(90deg,#fffa,#4f46e5);
border-radius:15px;
}

img#promptImage{
width:100%;
border-radius:20px;
margin-bottom:15px;
object-fit:cover;
}

h1{
font-size:22px;
margin-bottom:10px;
}

#content{
background:rgba(255,255,255,0.05);
padding:15px;
border-radius:10px;
white-space:pre-wrap;
margin-top:10px;
}

button{
padding:10px 15px;
border:none;
border-radius:10px;
background:#4f46e5;
color:white;
cursor:pointer;
font-size:14px;
margin-bottom:10px;
}

button:hover{
background:#6366f1;
}

.loader{
text-align:center;
margin-top:50px;
opacity:.6;
}

/* SEO */

#seoSection{
margin-top:30px;
padding:18px;
background:rgba(255,255,255,0.05);
border-radius:12px;
line-height:1.6;
font-size:14px;
}

#seoSection h2{
font-size:18px;
margin-bottom:10px;
}

/* MORE PROMPTS */

#morePrompts{
margin-top:40px;
}

#moreGrid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:15px;
}

.promptCard{
background:rgba(255,255,255,0.05);
border-radius:12px;
padding:10px;
cursor:pointer;
transition:.2s;
}

.promptCard:hover{
transform:scale(1.05);
background:rgba(255,255,255,0.08);
}

.promptCard img{
width:100%;
border-radius:8px;
margin-bottom:6px;
object-fit:cover;
}

.promptCard div{
font-size:13px;
opacity:.9;
}

</style>

</head>

<body>

<div id="unlockOverlay">

<div>Unlocking prompt...</div>

<div id="progressContainer">
<div id="progress"></div>
</div>

</div>

<img id="promptImage" src="" alt="Prompt Image" style="display:none;">

<h1 id="title" style="display:none;">Loading...</h1>

<button id="copyBtn" style="display:none;">Copy Prompt</button>

<div id="content" style="display:none;"></div>

<div class="loader" id="loader" style="display:none;">Loading...</div>

<!-- SEO -->

<div id="seoSection" style="display:none;">

<h2>About This AI Prompt</h2>
<p id="seoExplain"></p>

<h2>Tips For Best Results</h2>
<p id="seoTips"></p>

</div>

<!-- MORE PROMPTS -->

<div id="morePrompts" style="display:none;">

<h2>More Prompts</h2>

<div id="moreGrid"></div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbx4XOgMkg1KE5b0xEfNzx9RF2hQa2GZ-O9S3I95w_UFSjYC8RhGKIT5AMeUPvRFBBmx/exec";

const EXPLAIN_CSV="/content/explanations.csv";
const TIPS_CSV="/content/tips.csv";

const params=new URLSearchParams(window.location.search);
const id=parseInt(params.get("id"));

const titleEl=document.getElementById("title");
const contentEl=document.getElementById("content");
const copyBtn=document.getElementById("copyBtn");
const imgEl=document.getElementById("promptImage");

const overlay=document.getElementById("unlockOverlay");
const progressEl=document.getElementById("progress");

const seoSection=document.getElementById("seoSection");
const seoExplain=document.getElementById("seoExplain");
const seoTips=document.getElementById("seoTips");

const morePromptsSection=document.getElementById("morePrompts");
const moreGrid=document.getElementById("moreGrid");

let allPrompts;

function formatImage(url){

if(!url) return "";

let id="";

if(url.includes("open?id=")){
id=url.split("open?id=")[1];
}
else if(url.includes("/file/d/")){
id=url.split("/file/d/")[1].split("/")[0];
}

if(id){
return "https://lh3.googleusercontent.com/d/"+id;
}

return url;

}

async function loadCSV(url){

const res=await fetch(url);
const text=await res.text();

return text.split("\n").filter(x=>x.trim()!="");

}

function randomItem(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

/* FETCH PROMPTS */

fetch(API)
.then(res=>res.json())
.then(data=>{

allPrompts=data;

startUnlock();

})
.catch(err=>{

overlay.innerHTML="Error loading prompt";
console.error(err);

});

/* UNLOCK ANIMATION */

function startUnlock(){

let width=0;

const duration=5000;
const interval=50;

const steps=duration/interval;

let currentStep=0;

const progressInterval=setInterval(()=>{

const randomIncrement=(100/steps)*(0.5+Math.random());

width+=randomIncrement;

if(width>100) width=100;

progressEl.style.width=width+"%";

currentStep++;

if(width>=100 || currentStep>=steps*2){

clearInterval(progressInterval);

showPrompt();

}

},interval);

}

/* SHOW PROMPT */

async function showPrompt(){

overlay.style.display="none";

const promptData=allPrompts[id];

if(!promptData){

titleEl.textContent="Prompt not found";
titleEl.style.display="block";
return;

}

titleEl.style.display="block";
contentEl.style.display="block";
copyBtn.style.display="inline-block";

titleEl.textContent=promptData["Prompt Title"]||"Untitled";
contentEl.textContent=promptData["Prompt Text"]||"";

const img=formatImage(promptData["Image File"]);

if(img){
imgEl.src=img;
imgEl.style.display="block";
}

/* SEO */

const explainList=await loadCSV(EXPLAIN_CSV);
const tipsList=await loadCSV(TIPS_CSV);

seoExplain.textContent=randomItem(explainList);
seoTips.textContent=randomItem(tipsList);

seoSection.style.display="block";

/* SHOW MORE PROMPTS */

showMorePrompts();

}

/* COPY */

copyBtn.addEventListener("click",()=>{

navigator.clipboard.writeText(contentEl.textContent).then(()=>{

copyBtn.textContent="Copied!";

setTimeout(()=>copyBtn.textContent="Copy Prompt",1500);

});

});

/* MORE PROMPTS */

function showMorePrompts(){

if(!allPrompts) return;

let others=[];

for(let i=0;i<allPrompts.length;i++){

if(i!==id){
others.push({data:allPrompts[i],index:i});
}

}

others=others.sort(()=>0.5-Math.random()).slice(0,6);

others.forEach(p=>{

const card=document.createElement("div");

card.className="promptCard";

const img=formatImage(p.data["Image File"]);

card.innerHTML=`

<img src="${img}">
<div>${p.data["Prompt Title"]}</div>

`;

card.onclick=()=>{
window.location.href="prompt.html?id="+p.index;
};

moreGrid.appendChild(card);

});

morePromptsSection.style.display="block";

}

</script>

</body>
</html>
