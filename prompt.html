<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Viewer</title>

<style>

*{
  box-sizing:border-box;
}

html,body{
  max-width:100%;
  overflow-x:hidden;
}

body{
  background:#0f0f0f;
  color:white;
  font-family:system-ui;
  padding:20px;
  max-width:800px;
  margin:auto;
  position:relative;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 30%, #4f46e5, transparent 45%),
    radial-gradient(circle at 80% 70%, #06b6d4, transparent 45%),
    radial-gradient(circle at 40% 80%, #4f46e5, transparent 40%);
  filter:blur(120px);
  opacity:.9;
  z-index:-1;
}

.ad-center{
  display:flex;
  justify-content:center;
  align-items:center;
  margin:20px 0;
  max-width:100%;
  overflow:hidden;
}

.ad-728{
  width:100%;
  display:flex;
  justify-content:center;
}

@media (max-width:768px){
  .ad-728{
    display:none;
  }
}

#igPopup{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%) translateY(-20px);
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(16px);
  padding:12px 22px;
  border-radius:16px;
  color:white;
  font-weight:600;
  font-size:14px;
  opacity:0;
  transition:opacity .5s, transform .5s;
  z-index:1001;
  pointer-events:none;
}

#igPopup a{
  color:#4f46e5;
  text-decoration:none;
}

#unlockOverlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.75);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:1000;
  backdrop-filter:blur(4px);
}

#progressContainer{
  width:300px;
  height:20px;
  background:rgba(255,255,255,0.1);
  border-radius:15px;
  overflow:hidden;
  margin-top:10px;
}

#progress{
  width:0%;
  height:100%;
  background:linear-gradient(90deg,#fffa,#4f46e5);
}

img#promptImage{
  width:100%;
  border-radius:20px;
  margin-bottom:15px;
  object-fit:cover;
}

h1{
  font-size:22px;
  margin-bottom:10px;
}

#content{
  background:rgba(255,255,255,0.05);
  padding:15px;
  border-radius:10px;
  white-space:pre-wrap;
  margin-top:10px;
}

#expandBtn{
  margin-top:8px;
  font-size:13px;
  background:transparent;
  color:#8ab4ff;
  border:none;
  cursor:pointer;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:#4f46e5;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#6366f1;
}

.loader{
  text-align:center;
  margin-top:50px;
  opacity:.6;
}

#seoSection{
  margin-top:30px;
  padding:18px;
  background:rgba(255,255,255,0.05);
  border-radius:12px;
  line-height:1.6;
  font-size:14px;
}

#morePrompts{
  margin-top:40px;
}

#moreGrid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:15px;
}

.promptCard{
  background:rgba(255,255,255,0.05);
  border-radius:12px;
  padding:10px;
  cursor:pointer;
  transition:.2s;
}

.promptCard:hover{
  transform:scale(1.05);
  background:rgba(255,255,255,0.08);
}

.promptCard img{
  width:100%;
  border-radius:8px;
  margin-bottom:6px;
}

footer{
  margin-top:60px;
  padding-top:25px;
  border-top:1px solid rgba(255,255,255,0.1);
  text-align:center;
  font-size:13px;
  opacity:.8;
}

footer a{
  color:#aaa;
  margin:0 8px;
  text-decoration:none;
}

footer a:hover{
  color:white;
}

</style>
</head>


<body>

<!-- IG popup -->
<div id="igPopup">
<a href="https://www.instagram.com/made.by.manav" target="_blank">@made.by.manav</a>
• Followers: 51.6K | Posts: 70
</div>

<!-- Unlock overlay -->
<div id="unlockOverlay">
<div>Unlocking prompt...</div>

<div id="progressContainer">
<div id="progress"></div>
</div>
</div>


<img id="promptImage" src="" alt="Prompt Image" style="display:none;">
<h1 id="title" style="display:none;">Loading...</h1>

<button id="copyBtn" style="display:none;">Copy Prompt</button>

<div id="content" style="display:none;"></div>

<button id="expandBtn" style="display:none;">Show More</button>


<div id="seoSection" style="display:none;">
<h2>About This AI Prompt</h2>
<p id="seoExplain"></p>

<h2>Tips For Best Results</h2>
<p id="seoTips"></p>
</div>


<div id="morePrompts" style="display:none;">
<h2>More Prompts</h2>
<div id="moreGrid"></div>
</div>


<footer>

<div>New prompts added daily.</div>
<div>by RCHT & Manav</div>

<nav>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
<a href="privacy.html">Privacy</a>
<a href="terms.html">Terms</a>
</nav>

</footer>


<script>

/* API */

const API="https://script.google.com/macros/s/AKfycbx4XOgMkg1KE5b0xEfNzx9RF2hQa2GZ-O9S3I95w_UFSjYC8RhGKIT5AMeUPvRFBBmx/exec";

const params=new URLSearchParams(window.location.search);
const id=parseInt(params.get("id"));


/* elements */

const titleEl=document.getElementById("title");
const contentEl=document.getElementById("content");
const copyBtn=document.getElementById("copyBtn");
const imgEl=document.getElementById("promptImage");
const expandBtn=document.getElementById("expandBtn");

const overlay=document.getElementById("unlockOverlay");
const progressEl=document.getElementById("progress");

const seoSection=document.getElementById("seoSection");
const seoExplain=document.getElementById("seoExplain");
const seoTips=document.getElementById("seoTips");

const morePromptsSection=document.getElementById("morePrompts");
const moreGrid=document.getElementById("moreGrid");


/* state */

let allPrompts;
let fullPrompt="";
let expanded=false;

let adsTriggered=false;


/* ads */

function triggerUnlockAds(){

if(adsTriggered) return;

adsTriggered=true;

const pop=document.createElement("script");
pop.src="https://pl29033356.profitablecpmratenetwork.com/66/35/13/663513085ca9542f459ee6ffb4d20754.js";
pop.id="popAd";
document.body.appendChild(pop);

const social=document.createElement("script");
social.src="https://pl29033403.profitablecpmratenetwork.com/c7/58/83/c7588384a025a5f208695da76567edd6.js";
social.id="socialAd";
document.body.appendChild(social);

document.addEventListener("click",disableAds,{once:true});

}


function disableAds(){

const pop=document.getElementById("popAd");
const social=document.getElementById("socialAd");

if(pop) pop.remove();
if(social) social.remove();

}


/* image loader */

function formatImage(url){

if(!url) return "";

let id="";

if(url.includes("open?id=")){
id=url.split("open?id=")[1];
}

else if(url.includes("/file/d/")){
id=url.split("/file/d/")[1].split("/")[0];
}

if(id){
return "https://lh3.googleusercontent.com/d/"+id;
}

return url;

}

function preloadImage(src){

const img=new Image();

img.onload=function(){
imgEl.src=src;
imgEl.style.display="block";
};

img.src=src;

}


/* fetch prompts */

fetch(API)
.then(res=>res.json())
.then(data=>{
allPrompts=data;
startUnlock();
});


/* unlock flow */

function startUnlock(){

setTimeout(triggerUnlockAds,300);

let width=0;

const progressInterval=setInterval(function(){

width+=Math.random()*5;

if(width>100) width=100;

progressEl.style.width=width+"%";

if(width>=100){

clearInterval(progressInterval);
showPrompt();

}

},50);

}


/* show prompt */

function showPrompt(){

overlay.style.display="none";

const promptData=allPrompts[id];

if(!promptData){
titleEl.textContent="Prompt not found";
titleEl.style.display="block";
return;
}

titleEl.style.display="block";
contentEl.style.display="block";
copyBtn.style.display="inline-block";

titleEl.textContent=promptData["Prompt Title"]||"Untitled";

fullPrompt=promptData["Prompt Text"]||"";

const img=formatImage(promptData["Image File"]);

if(img){
preloadImage(img);
}

}

</script>

</body>
</html>
