<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Viewer</title>
<style>
body{
  background:#0f0f0f;
  color:white;
  font-family:system-ui;
  padding:20px;
  max-width:800px;
  margin:auto;
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 30%, #4f46e5, transparent 45%),
    radial-gradient(circle at 80% 70%, #06b6d4, transparent 45%),
    radial-gradient(circle at 40% 80%, #4f46e5, transparent 40%);
  filter:blur(120px);
  opacity:.9;
  z-index:-1;
}
img#promptImage{
  width:100%;
  border-radius:20px;
  margin-bottom:15px;
  object-fit:cover;
}
h1{
  font-size:22px;
  margin-bottom:10px;
}
#content{
  background:rgba(255,255,255,0.05);
  padding:15px;
  border-radius:10px;
  white-space:pre-wrap;
  margin-top:10px;
}
button{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:#4f46e5;
  color:white;
  cursor:pointer;
  font-size:14px;
  margin-bottom:10px;
}
button:hover{
  background:#6366f1;
}
.loader{
  text-align:center;
  margin-top:50px;
  opacity:.6;
}
</style>
</head>
<body>

<img id="promptImage" src="" alt="Prompt Image">
<h1 id="title">Loading...</h1>
<button id="copyBtn">Copy Prompt</button>
<div id="content"></div>
<div class="loader" id="loader">Loading...</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbx4XOgMkg1KE5b0xEfNzx9RF2hQa2GZ-O9S3I95w_UFSjYC8RhGKIT5AMeUPvRFBBmx/exec";

// Get the ID from URL
const params = new URLSearchParams(window.location.search);
const id = parseInt(params.get("id"));

// Elements
const titleEl = document.getElementById("title");
const contentEl = document.getElementById("content");
const loaderEl = document.getElementById("loader");
const copyBtn = document.getElementById("copyBtn");
const imgEl = document.getElementById("promptImage");

// Helper to format Google Drive links
function formatImage(url){
  if(!url) return "";
  let id="";
  if(url.includes("open?id=")){
    id=url.split("open?id=")[1];
  } else if(url.includes("/file/d/")){
    id=url.split("/file/d/")[1].split("/")[0];
  }
  if(id){
    return "https://lh3.googleusercontent.com/d/"+id;
  }
  return url;
}

// Fetch prompts
fetch(API)
  .then(res => res.json())
  .then(data => {
    loaderEl.style.display = "none";
    if (!data[id]) {
      titleEl.textContent = "Prompt not found";
      contentEl.textContent = "";
      copyBtn.style.display = "none";
      imgEl.style.display = "none";
      return;
    }
    const prompt = data[id];
    titleEl.textContent = prompt["Prompt Title"] || "Untitled";
    contentEl.textContent = prompt["Prompt Text"] || "";
    imgEl.src = formatImage(prompt["Image File"]) || "";
    if(!imgEl.src) imgEl.style.display="none";
  })
  .catch(err => {
    loaderEl.style.display = "none";
    titleEl.textContent = "Error loading prompt";
    contentEl.textContent = "";
    copyBtn.style.display = "none";
    imgEl.style.display="none";
    console.error(err);
  });

// Copy button functionality
copyBtn.addEventListener("click", () => {
  const text = contentEl.textContent;
  navigator.clipboard.writeText(text).then(() => {
    copyBtn.textContent = "Copied!";
    setTimeout(() => copyBtn.textContent = "Copy Prompt", 1500);
  });
});
</script>

</body>
</html>
