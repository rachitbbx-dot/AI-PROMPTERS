<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Prompt</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui;
}

body{
background:#0f0f0f;
color:white;
padding:20px;
}

body::before{
content:"";
position:fixed;
inset:0;

background:
radial-gradient(circle at 20% 30%, #4f46e5, transparent 45%),
radial-gradient(circle at 80% 70%, #06b6d4, transparent 45%),
radial-gradient(circle at 40% 80%, #4f46e5, transparent 40%);

filter:blur(120px);
opacity:.9;
z-index:-1;
}

.container{
max-width:900px;
margin:auto;
}

.back{
margin-bottom:20px;
cursor:pointer;
}

.image{
width:100%;
border-radius:20px;
margin-bottom:20px;
}

.title{
font-size:22px;
margin-bottom:15px;
}

.unlock{
padding:12px 20px;
border:none;
border-radius:30px;
background:#4f46e5;
color:white;
cursor:pointer;
margin-bottom:15px;
}

.prompt{
display:none;
background:rgba(255,255,255,.08);
padding:20px;
border-radius:20px;
margin-bottom:10px;
}

.copy{
display:none;
padding:10px 20px;
border:none;
border-radius:30px;
background:#06b6d4;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<div class="back" onclick="history.back()">← Back</div>

<img id="image" class="image">

<div id="title" class="title"></div>

<button class="unlock" onclick="unlockPrompt()">Unlock Prompt</button>

<div id="prompt" class="prompt"></div>

<button id="copyBtn" class="copy" onclick="copyPrompt()">Copy Prompt</button>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbx4XOgMkg1KE5b0xEfNzx9RF2hQa2GZ-O9S3I95w_UFSjYC8RhGKIT5AMeUPvRFBBmx/exec"

const params=new URLSearchParams(window.location.search)

const id=params.get("id")

let prompts=[]
let current

/* FIX DRIVE IMAGES */

function formatImage(url){

if(!url) return ""

let id=""

/* open?id= format */

if(url.includes("open?id=")){
id=url.split("open?id=")[1]
}

/* file/d/ format */

else if(url.includes("/file/d/")){
id=url.split("/file/d/")[1].split("/")[0]
}

/* uc?id= format */

else if(url.includes("uc?id=")){
id=url.split("uc?id=")[1].split("&")[0]
}

/* already correct */

else if(url.includes("uc?export=view")){
return url
}

if(id){
return "https://drive.google.com/uc?export=view&id="+id
}

return url
}
fetch(API)
.then(res=>res.json())
.then(data=>{

prompts=data.reverse()

current=prompts[id]

document.getElementById("image").src=formatImage(current["Image File"])

document.getElementById("title").textContent=current["Prompt Title"]

document.getElementById("prompt").textContent=current["Prompt Text"]

})

function unlockPrompt(){

document.getElementById("prompt").style.display="block"

document.getElementById("copyBtn").style.display="inline-block"

}

function copyPrompt(){

navigator.clipboard.writeText(current["Prompt Text"])

alert("Prompt copied")

}

</script>

</body>
</html>
