<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Prompt Gallery | Prompt Hub</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}
body{background:#0f0f0f;color:white;padding:16px;}
body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 30%,#4f46e5,transparent 45%),
radial-gradient(circle at 80% 70%,#06b6d4,transparent 45%),
radial-gradient(circle at 40% 80%,#4f46e5,transparent 40%);
filter:blur(120px);
opacity:.9;
z-index:-1;
}
/* Top Banner */
#topRunner{
width:100%;
background:linear-gradient(90deg,#4f46e5,#06b6d4);
color:white;
text-align:center;
padding:10px 0;
font-weight:600;
font-size:14px;
position:sticky;
top:0;
z-index:1000;
box-shadow:0 3px 8px rgba(0,0,0,0.3);
animation:slideDown 1s ease;
}
@keyframes slideDown{from{transform:translateY(-100%);}to{transform:translateY(0);}}

/* Instagram Widget */
#igStats{
background:rgba(255,255,255,0.05);
padding:12px 18px;
border-radius:12px;
margin:16px 0;
text-align:center;
font-size:14px;
color:white;
backdrop-filter:blur(8px);
display:flex;
flex-direction:column;
align-items:center;
gap:4px;
transition:0.3s;
}
#igStats a{color:#4f46e5;text-decoration:none;font-weight:600;}
#igStats a:hover{opacity:.85;}

/* header, gallery, cards, etc. */
.header{max-width:1100px;margin:auto;margin-bottom:18px;padding:16px;}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.backBtn{background:rgba(255,255,255,.08);border-radius:20px;padding:8px 14px;font-size:13px;cursor:pointer;}
.searchWrap{position:relative;margin-bottom:12px;}
.search{width:100%;padding:14px 42px 14px 16px;border-radius:20px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:white;font-size:14px;}
.search::placeholder{color:rgba(255,255,255,.5);}
.searchIcon{position:absolute;right:14px;top:50%;transform:translateY(-50%);opacity:.6;}
.controls{display:flex;gap:8px;flex-wrap:wrap;}
select{padding:10px 14px;border-radius:20px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:white;font-size:13px;cursor:pointer;}
.gallery{max-width:1100px;margin:auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));grid-auto-rows:10px;gap:12px;}
.card{background:rgba(255,255,255,.05);border-radius:14px;overflow:hidden;cursor:pointer;border:1px solid rgba(255,255,255,.12);opacity:0;transform:translateY(10px);transition:.35s;}
.card.show{opacity:1;transform:translateY(0);}
.card:hover{transform:scale(1.03);}
.card img{width:100%;display:block;}
.cardTitle{padding:8px;font-size:13px;font-weight:700;text-align:center;color:white;line-height:1.3;background:rgba(0,0,0,.25);}
.loader{width:36px;height:36px;border:4px solid rgba(255,255,255,.2);border-top:4px solid #4f46e5;border-radius:50%;animation:spin .8s linear infinite;margin:40px auto;display:none;}
@keyframes spin{to{transform:rotate(360deg);}}
/* Random Copy Popup */
#copyPopup{position:fixed;bottom:20px;right:20px;background:rgba(0,0,0,0.85);color:white;padding:12px 18px;border-radius:12px;box-shadow:0 5px 20px rgba(0,0,0,0.4);font-size:13px;opacity:0;transition:opacity 0.5s,transform 0.5s;}
#copyPopup.show{opacity:1;transform:translateY(-10px);}
</style>
</head>

<body>

<div id="topRunner">🎉 New Prompts Released Weekly! Stay Tuned 🎉</div>

<div class="header">
<div class="topbar">
<button class="backBtn" onclick="goHome()">← Home</button>
</div>

<div class="searchWrap">
<input id="search" class="search" placeholder="Search prompts">
<div class="searchIcon">🔍</div>
</div>

<div class="controls">
<select id="category">
<option value="all">All Categories</option>
<option value="couple">Couple</option>
<option value="male">Male</option>
<option value="female">Female</option>
<option value="unisex">Unisex</option>
<option value="pfp">PFP</option>
</select>
<select id="sort">
<option value="new">Newest</option>
<option value="old">Oldest</option>
<option value="random">Random</option>
</select>
</div>
</div>

<!-- Instagram Stats -->
<div id="igStats">
<a href="https://www.instagram.com/made.by.manav" target="_blank">@made.by.manav</a>
<span>Followers: 51.6K | Posts: 70</span>
</div>

<div id="gallery" class="gallery"></div>
<div id="loader" class="loader"></div>
<div id="copyPopup"></div>

<script>
function goHome(){window.location.href="index.html"}

const API="https://script.google.com/macros/s/AKfycbx4XOgMkg1KE5b0xEfNzx9RF2hQa2GZ-O9S3I95w_UFSjYC8RhGKIT5AMeUPvRFBBmx/exec"
let prompts=[], filtered=[], loaded=0, batch=12
const gallery=document.getElementById("gallery"), loader=document.getElementById("loader")

function formatImage(url){if(!url) return ""; let id=""; if(url.includes("open?id=")) id=url.split("open?id=")[1]; else if(url.includes("/file/d/")) id=url.split("/file/d/")[1].split("/")[0]; if(id) return "https://lh3.googleusercontent.com/d/"+id; return url;}

function resizeCard(card){const rowHeight=10,rowGap=12,img=card.querySelector("img"),height=img.getBoundingClientRect().height; const span=Math.ceil((height+rowGap)/(rowHeight+rowGap)); card.style.gridRowEnd="span "+span;}

function renderMore(){const next=filtered.slice(loaded,loaded+batch); next.forEach(p=>{const index=prompts.indexOf(p); const img=formatImage(p["Image File"]); const title=p["Prompt Title"]||"AI Prompt"; const card=document.createElement("div"); card.className="card"; card.innerHTML=`<div class="skeleton"></div><img src="${img}" alt="${title}" style="display:none"><div class="cardTitle">${title}</div>`; card.onclick=()=>{window.location.href=`prompt.html?id=${index}`}; gallery.appendChild(card); const image=card.querySelector("img"), skeleton=card.querySelector(".skeleton"); image.onload=()=>{skeleton.remove(); image.style.display="block"; resizeCard(card); card.classList.add("show"); showRandomCopyPopup();}}); loaded+=batch;}

window.addEventListener("scroll",()=>{if(window.innerHeight+window.scrollY>=document.body.offsetHeight-600){if(loaded>=filtered.length) return; loader.style.display="block"; setTimeout(()=>{renderMore(); loader.style.display="none";},200)}})

document.getElementById("search").addEventListener("input",e=>{const term=e.target.value.toLowerCase(); filtered=prompts.filter(p=>(p["Prompt Title"]||"").toLowerCase().includes(term)||(p["Tags"]||"").toLowerCase().includes(term)); reset();})

document.getElementById("category").addEventListener("change",applyFilters)
document.getElementById("sort").addEventListener("change",applyFilters)

function applyFilters(){let list=[...prompts]; const category=document.getElementById("category").value, sort=document.getElementById("sort").value; if(category!=="all") list=list.filter(p=>(p["Category"]||"").toLowerCase()===category); if(sort==="new") list.sort((a,b)=>new Date(b.Timestamp)-new Date(a.Timestamp)); if(sort==="old") list.sort((a,b)=>new Date(a.Timestamp)-new Date(b.Timestamp)); if(sort==="random") list.sort(()=>Math.random()-0.5); filtered=list; reset();}

function reset(){gallery.innerHTML=""; loaded=0; renderMore();}

function loadPrompts(){const cache=localStorage.getItem("promptCache"), time=localStorage.getItem("promptCacheTime"); if(cache && time && Date.now()-time<300000){prompts=JSON.parse(cache); applyFilters(); return;} fetch(API).then(res=>res.json()).then(data=>{prompts=data; localStorage.setItem("promptCache",JSON.stringify(data)); localStorage.setItem("promptCacheTime",Date.now()); applyFilters();})}

loadPrompts()

// Random Copy Popup
const copyPopup=document.getElementById("copyPopup")
const randomNames=["Alex","Jamie","Jordan","Taylor","Morgan","Casey","Riley","Sam","Charlie","Dakota","Skyler","Quinn"]

function showRandomCopyPopup(){
const name=randomNames[Math.floor(Math.random()*randomNames.length)]
const min=Math.floor(Math.random()*59)+1
copyPopup.innerText=`${name} copied a prompt ${min} minutes ago`
copyPopup.classList.add("show")
setTimeout(()=>copyPopup.classList.remove("show"),3500)
}
</script>

</body>
</html>
