<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Prompt Gallery</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui;
}

body{
background:#0f0f0f;
color:white;
padding:20px;
}

/* background */

body::before{
content:"";
position:fixed;
inset:0;

background:
radial-gradient(circle at 20% 30%, #4f46e5, transparent 45%),
radial-gradient(circle at 80% 70%, #06b6d4, transparent 45%),
radial-gradient(circle at 40% 80%, #4f46e5, transparent 40%);

filter:blur(120px);
opacity:.9;
z-index:-1;
}

/* header */

.header{
max-width:1000px;
margin:auto;
margin-bottom:25px;
}

.search{
width:100%;
padding:14px;
border-radius:20px;
border:none;
background:rgba(255,255,255,.1);
color:white;
margin-bottom:14px;
}

.controls{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

select{
padding:10px 14px;
border-radius:20px;
border:none;
background:rgba(255,255,255,.1);
color:white;
}

/* gallery */

.gallery{
max-width:1000px;
margin:auto;
column-count:3;
column-gap:16px;
}

@media(max-width:800px){
.gallery{
column-count:2;
}
}

.card{
break-inside:avoid;
margin-bottom:16px;
background:rgba(255,255,255,.08);
border-radius:20px;
overflow:hidden;
border:1px solid rgba(255,255,255,.2);
cursor:pointer;
}

.card img{
width:100%;
display:block;
}

.cardTitle{
padding:10px;
font-size:14px;
}

.loader{
text-align:center;
margin:20px;
opacity:.6;
}

</style>

</head>

<body>

<div class="header">

<input class="search" id="search" placeholder="Search prompts...">

<div class="controls">

<select id="category">
<option value="all">All Categories</option>
<option value="couple">Couple</option>
<option value="male">Male</option>
<option value="female">Female</option>
<option value="unisex">Unisex</option>
<option value="pfp">PFP</option>
</select>

<select id="sort">
<option value="new">Newest</option>
<option value="old">Oldest</option>
<option value="random">Random</option>
<option value="popular">Popular</option>
</select>

</div>

</div>

<div id="gallery" class="gallery"></div>

<div class="loader">Loading...</div>

<script>

const API="https://script.google.com/macros/s/AKfycbx4XOgMkg1KE5b0xEfNzx9RF2hQa2GZ-O9S3I95w_UFSjYC8RhGKIT5AMeUPvRFBBmx/exec"

let prompts=[]
let filtered=[]

let loaded=0
const batch=12

/* FIX GOOGLE DRIVE IMAGE LINKS */

function formatImage(url){

if(!url) return ""

let id=""

/* open?id= format */

if(url.includes("open?id=")){
id=url.split("open?id=")[1]
}

/* file/d/ format */

else if(url.includes("/file/d/")){
id=url.split("/file/d/")[1].split("/")[0]
}

/* uc?id= format */

else if(url.includes("uc?id=")){
id=url.split("uc?id=")[1].split("&")[0]
}

/* already correct */

else if(url.includes("uc?export=view")){
return url
}

if(id){
return "https://drive.google.com/uc?export=view&id="+id
}

return url
}
/* LOAD DATA */

fetch(API)
.then(res=>res.json())
.then(data=>{

prompts=data.reverse()

filtered=[...prompts]

renderMore()

})

function renderMore(){

const gallery=document.getElementById("gallery")

const next=filtered.slice(loaded,loaded+batch)

next.forEach((p,index)=>{

const realIndex=loaded+index

const card=document.createElement("div")

card.className="card"

card.onclick=()=>{
window.location.href=`prompt.html?id=${realIndex}`
}

card.innerHTML=`

<img src="${formatImage(p['Image File'])}">

<div class="cardTitle">${p['Prompt Title']}</div>

`

gallery.appendChild(card)

})

loaded+=batch

}

/* INFINITE SCROLL */

window.addEventListener("scroll",()=>{

if(window.innerHeight+window.scrollY>=document.body.offsetHeight-400){

renderMore()

}

})

/* SEARCH */

document.getElementById("search").addEventListener("input",e=>{

const term=e.target.value.toLowerCase()

filtered=prompts.filter(p=>

p['Prompt Title'].toLowerCase().includes(term) ||
(p['Tags'] && p['Tags'].toLowerCase().includes(term))

)

reset()

})

/* FILTER */

document.getElementById("category").addEventListener("change",applyFilters)
document.getElementById("sort").addEventListener("change",applyFilters)

function applyFilters(){

let list=[...prompts]

const category=document.getElementById("category").value
const sort=document.getElementById("sort").value

if(category!=="all"){

list=list.filter(p=>p['Category'].toLowerCase()===category)

}

if(sort==="random"){
list=list.sort(()=>Math.random()-0.5)
}

if(sort==="old"){
list=list.reverse()
}

filtered=list

reset()

}

function reset(){

document.getElementById("gallery").innerHTML=""

loaded=0

renderMore()

}

</script>

</body>
</html>
