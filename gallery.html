<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Prompt Gallery</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui;
}

body{
background:#0f0f0f;
color:white;
padding:16px;
}

/* background glow */

body::before{
content:"";
position:fixed;
inset:0;

background:
radial-gradient(circle at 20% 30%,#4f46e5,transparent 45%),
radial-gradient(circle at 80% 70%,#06b6d4,transparent 45%),
radial-gradient(circle at 40% 80%,#4f46e5,transparent 40%);

filter:blur(120px);
opacity:.9;
z-index:-1;
}

/* header */

.header{
max-width:1100px;
margin:auto;
margin-bottom:20px;
}

.searchWrap{
position:relative;
margin-bottom:12px;
}

.search{
width:100%;
padding:14px 42px 14px 16px;
border-radius:20px;
border:none;
background:rgba(255,255,255,.1);
color:white;
font-size:14px;
}

.searchIcon{
position:absolute;
right:14px;
top:50%;
transform:translateY(-50%);
opacity:.6;
}

/* controls */

.controls{
display:flex;
gap:8px;
flex-wrap:wrap;
margin-bottom:14px;
}

select{
padding:10px 14px;
border-radius:20px;
border:none;
background:rgba(255,255,255,.1);
color:white;
}

/* gallery grid */

.gallery{
max-width:1100px;
margin:auto;

display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
grid-auto-rows:10px;
gap:12px;
}

/* card */

.card{
background:rgba(255,255,255,.05);
border-radius:14px;
overflow:hidden;
cursor:pointer;

opacity:0;
transform:translateY(8px);
transition:.3s;
}

.card.show{
opacity:1;
transform:translateY(0);
}

.card img{
width:100%;
display:block;
}

/* loader */

.loader{
width:36px;
height:36px;

border:4px solid rgba(255,255,255,.2);
border-top:4px solid #4f46e5;

border-radius:50%;

animation:spin .8s linear infinite;

margin:40px auto;

display:none;
}

@keyframes spin{
to{transform:rotate(360deg);}
}

</style>
</head>

<body>

<div class="header">

<div class="searchWrap">

<input id="search" class="search" placeholder="Search prompts">

<div class="searchIcon">🔍</div>

</div>

<div class="controls">

<select id="category">
<option value="all">All Categories</option>
<option value="couple">Couple</option>
<option value="male">Male</option>
<option value="female">Female</option>
<option value="unisex">Unisex</option>
<option value="pfp">PFP</option>
</select>

<select id="sort">
<option value="new">Newest</option>
<option value="old">Oldest</option>
<option value="random">Random</option>
</select>

</div>

</div>

<div id="gallery" class="gallery"></div>

<div id="loader" class="loader"></div>

<script>

const API="https://script.google.com/macros/s/AKfycbx4XOgMkg1KE5b0xEfNzx9RF2hQa2GZ-O9S3I95w_UFSjYC8RhGKIT5AMeUPvRFBBmx/exec"

let prompts=[]
let filtered=[]
let loaded=0

const batch=12

const gallery=document.getElementById("gallery")
const loader=document.getElementById("loader")

/* drive image fix */

function formatImage(url){

if(!url) return ""

let id=""

if(url.includes("open?id="))
id=url.split("open?id=")[1]

else if(url.includes("/file/d/"))
id=url.split("/file/d/")[1].split("/")[0]

if(id) return "https://lh3.googleusercontent.com/d/"+id

return url

}

/* masonry size */

function resizeCard(card){

const rowHeight=10
const rowGap=12

const img=card.querySelector("img")

const height=img.getBoundingClientRect().height

const span=Math.ceil((height+rowGap)/(rowHeight+rowGap))

card.style.gridRowEnd="span "+span

}

/* render */

function renderMore(){

const next=filtered.slice(loaded,loaded+batch)

next.forEach(p=>{

const index=prompts.indexOf(p)

const img=formatImage(p["Image File"])

const card=document.createElement("div")

card.className="card"

card.innerHTML=`<img src="${img}" alt="${p["Prompt Title"]}">`

card.onclick=()=>{
window.location.href=`prompt.html?id=${index}`
}

gallery.appendChild(card)

const image=card.querySelector("img")

image.onload=()=>{

resizeCard(card)

card.classList.add("show")

}

})

loaded+=batch

}

/* infinite scroll */

window.addEventListener("scroll",()=>{

if(window.innerHeight+window.scrollY>=document.body.offsetHeight-600){

if(loaded>=filtered.length) return

loader.style.display="block"

setTimeout(()=>{

renderMore()

loader.style.display="none"

},200)

}

})

/* search */

document.getElementById("search").addEventListener("input",e=>{

const term=e.target.value.toLowerCase()

filtered=prompts.filter(p=>

(p["Prompt Title"]||"").toLowerCase().includes(term) ||
(p["Tags"]||"").toLowerCase().includes(term)

)

reset()

})

/* filters */

document.getElementById("category").addEventListener("change",applyFilters)
document.getElementById("sort").addEventListener("change",applyFilters)

function applyFilters(){

let list=[...prompts]

const category=document.getElementById("category").value
const sort=document.getElementById("sort").value

if(category!=="all")
list=list.filter(p=>
(p["Category"]||"").toLowerCase()===category
)

if(sort==="new")
list.sort((a,b)=>new Date(b.Timestamp)-new Date(a.Timestamp))

if(sort==="old")
list.sort((a,b)=>new Date(a.Timestamp)-new Date(b.Timestamp))

if(sort==="random")
list.sort(()=>Math.random()-0.5)

filtered=list

reset()

}

/* reset */

function reset(){

gallery.innerHTML=""

loaded=0

renderMore()

}

/* cache system */

function loadPrompts(){

const cache=localStorage.getItem("promptCache")
const time=localStorage.getItem("promptCacheTime")

if(cache && time && Date.now()-time<300000){

prompts=JSON.parse(cache)

applyFilters()

return

}

fetch(API)
.then(res=>res.json())
.then(data=>{

prompts=data

localStorage.setItem("promptCache",JSON.stringify(data))
localStorage.setItem("promptCacheTime",Date.now())

applyFilters()

})

}

/* start */

loadPrompts()

</script>

</body>
</html>
