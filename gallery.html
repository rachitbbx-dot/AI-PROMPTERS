<!DOCTYPE html>
<html lang="en">
<head>
  <script>(function(s){s.dataset.zone='10896009',s.src='https://n6wxm.com/vignette.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Gallery</title>

<!-- Monetag Multitag - global monetization -->


  
<style>
/* ===================== GLOBAL RESET ===================== */
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}
html,body{max-width:100%;overflow-x:hidden;}
body{background:#0f0f0f;color:white;padding:16px;}

/* BACKGROUND EFFECT */
body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 30%,#4f46e5,transparent 45%),
radial-gradient(circle at 80% 70%,#06b6d4,transparent 45%),
radial-gradient(circle at 40% 80%,#4f46e5,transparent 40%);
filter:blur(120px);
opacity:.9;
z-index:-1;
}

/* AD CONTAINER STYLES (currently empty - Monetag will reuse these) */
.ad-center{
display:flex;
justify-content:center;
align-items:center;
margin:20px 0;
max-width:100%;
overflow:hidden;
}
.ad-728{
width:100%;
display:flex;
justify-content:center;
}
@media(max-width:768px){.ad-728{display:none;}}

/* PAGE LOADER */
#pageLoader{
position:fixed;
inset:0;
background:#0f0f0f;
display:flex;
align-items:center;
justify-content:center;
z-index:2000;
flex-direction:column;
gap:14px;
}
.loaderSpin{
width:42px;
height:42px;
border:4px solid rgba(255,255,255,.2);
border-top:4px solid #4f46e5;
border-radius:50%;
animation:spin 1s linear infinite;
}
.loaderText{
font-size:14px;
opacity:.8;
}

/* IG POPUP */
#igPopup{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%) translateY(-20px);
background:rgba(255,255,255,0.1);
backdrop-filter:blur(16px);
padding:12px 22px;
border-radius:16px;
color:white;
font-weight:600;
font-size:14px;
opacity:0;
transition:opacity 0.5s, transform 0.5s;
z-index:1001;
pointer-events:none;
}
#igPopup a{color:#4f46e5;text-decoration:none;}

/* USER ACTION POPUP */
#userPopup{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%) translateY(40px);
background:rgba(255,255,255,0.08);
backdrop-filter:blur(16px);
padding:10px 18px;
border-radius:12px;
font-size:13px;
color:white;
opacity:0;
transition:opacity 0.4s, transform 0.4s;
z-index:1001;
}

/* HEADER + SEARCH + CONTROLS */
.header{
max-width:1100px;
margin:auto;
margin-bottom:18px;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(40px);
border:1px solid rgba(255,255,255,.15);
border-radius:18px;
padding:16px;
box-shadow:0 20px 50px rgba(0,0,0,.6);
}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.backBtn{
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.2);
border-radius:20px;
padding:8px 14px;
font-size:13px;
cursor:pointer;
}
.searchWrap{position:relative;margin-bottom:12px;}
.search{
width:100%;
padding:14px 42px 14px 16px;
border-radius:20px;
border:1px solid rgba(255,255,255,.15);
background:rgba(255,255,255,.08);
color:white;
font-size:14px;
}
.search::placeholder{color:rgba(255,255,255,.5);}
.searchIcon{
position:absolute;
right:14px;
top:50%;
transform:translateY(-50%);
opacity:.6;
}
.controls{display:flex;gap:8px;flex-wrap:wrap;}
select{
padding:10px 14px;
border-radius:20px;
border:1px solid rgba(255,255,255,.15);
background:rgba(255,255,255,.08);
color:white;
font-size:13px;
cursor:pointer;
}

/* GALLERY CARDS */
.gallery{
max-width:1100px;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
grid-auto-rows:10px;
gap:12px;
}
.card{
background:rgba(255,255,255,.05);
border-radius:14px;
overflow:hidden;
cursor:pointer;
border:1px solid rgba(255,255,255,.12);
opacity:0;
transform:translateY(10px);
transition:.35s;
}
.card.show{opacity:1;transform:translateY(0);}
.card:hover{transform:scale(1.03);}
.card img{width:100%;display:block;}
.cardTitle{
padding:8px;
font-size:13px;
font-weight:700;
text-align:center;
color:white;
line-height:1.3;
background:rgba(0,0,0,.25);
}

/* LAZY LOADER */
.loader{
width:36px;
height:36px;
border:4px solid rgba(255,255,255,.2);
border-top:4px solid #4f46e5;
border-radius:50%;
animation:spin .8s linear infinite;
margin:40px auto;
display:none;
}

@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>

<body>

<!-- PAGE LOADER -->
<div id="pageLoader">
<div class="loaderSpin"></div>
<div class="loaderText">Loading prompts...</div>
</div>

<!-- IG POPUP -->
<div id="igPopup">
<a href="https://www.instagram.com/made.by.manav" target="_blank">@made.by.manav</a> • Followers: 51.6K | Posts: 70
</div>

<!-- USER ACTION POPUP -->
<div id="userPopup"></div>

<!-- HEADER + SEARCH + CONTROLS -->
<div class="header">
<div class="topbar">
<button class="backBtn" onclick="goHome()">← Home</button>
</div>

<div class="searchWrap">
<input id="search" class="search" placeholder="Search prompts">
<div class="searchIcon">🔍</div>
</div>

<div class="controls">
<select id="sort">
<option value="new">Newest</option>
<option value="old">Oldest</option>
<option value="random">Random</option>
</select>
</div>
</div>

<!-- GALLERY GRID -->
<div id="gallery" class="gallery"></div>

<!-- LAZY LOADER -->
<div id="loader" class="loader"></div>

<!-- ===================== SCRIPTS ===================== -->
<script>
/* NAVIGATION */
function goHome(){window.location.href="index.html";}

/* IG POPUP SHOW/HIDE */
function showIGPopup(duration=4000){
const popup=document.getElementById('igPopup');
popup.style.opacity=1;
popup.style.transform='translateX(-50%) translateY(0)';
setTimeout(()=>{
popup.style.opacity=0;
popup.style.transform='translateX(-50%) translateY(-20px)';
},duration);
}

/* USER ACTION POPUP (random names + actions) */
const users=["Alex","Sam","Jordan","Taylor","Morgan","Casey","Riley","Jamie","Charlie","Avery"];
const actions=["copied your prompt","liked your prompt","shared your prompt"];
function showUserPopup(){
const popup=document.getElementById('userPopup');
const name=users[Math.floor(Math.random()*users.length)];
const action=actions[Math.floor(Math.random()*actions.length)];
popup.textContent=`${name} ${action}`;
popup.style.opacity=1;
popup.style.transform='translateX(-50%) translateY(0)';
setTimeout(()=>{
popup.style.opacity=0;
popup.style.transform='translateX(-50%) translateY(40px)';
},3000);
}
setInterval(()=>{showUserPopup();},5000 + Math.random()*7000);

/* API & PROMPT FETCHING */
const API="https://script.google.com/macros/s/AKfycbx4XOgMkg1KE5b0xEfNzx9RF2hQa2GZ-O9S3I95w_UFSjYC8RhGKIT5AMeUPvRFBBmx/exec";
let prompts=[],filtered=[],loaded=0,batch=12;
const gallery=document.getElementById("gallery"),loader=document.getElementById("loader");

/* FORMAT GOOGLE DRIVE IMAGE LINKS */
function formatImage(url){
if(!url) return "";
let id="";
if(url.includes("open?id=")) id=url.split("open?id=")[1];
else if(url.includes("/file/d/")) id=url.split("/file/d/")[1].split("/")[0];
if(id) return "https://lh3.googleusercontent.com/d/"+id;
return url;
}

/* RESIZE CARDS TO GRID */
function resizeCard(card){
const rowHeight=10,rowGap=12,img=card.querySelector("img");
const height=img.getBoundingClientRect().height;
const span=Math.ceil((height+rowGap)/(rowHeight+rowGap));
card.style.gridRowEnd="span "+span;
}

/* RENDER BATCH OF PROMPTS */
function renderMore(){
const next=filtered.slice(loaded,loaded+batch);
next.forEach(p=>{
const index=prompts.indexOf(p);
const img=formatImage(p["Image File"]);
const title=p["Prompt Title"]||"AI Prompt";

const card=document.createElement("div");
card.className="card";
card.innerHTML=`<img src="${img}" alt="${title}"><div class="cardTitle">${title}</div>`;
card.onclick=()=>{window.location.href=`prompt.html?id=${index}`;};

gallery.appendChild(card);

const image=card.querySelector("img");
image.onload=()=>{resizeCard(card);card.classList.add("show");}
});
loaded+=batch;
}

/* INFINITE SCROLL */
window.addEventListener("scroll",()=>{
if(window.innerHeight+window.scrollY>=document.body.offsetHeight-600){
if(loaded>=filtered.length) return;
loader.style.display="block";
setTimeout(()=>{renderMore();loader.style.display="none";},200);
}
});

/* SEARCH FUNCTIONALITY */
document.getElementById("search").addEventListener("input",e=>{
const term=e.target.value.toLowerCase();
filtered=prompts.filter(p=>
(p["Prompt Title"]||"").toLowerCase().includes(term) ||
(p["Tags"]||"").toLowerCase().includes(term)
);
reset();
});

/* SORT FUNCTIONALITY */
document.getElementById("sort").addEventListener("change",applySort);
function applySort(){
let list=[...filtered];
const sort=document.getElementById("sort").value;
if(sort==="new") list.sort((a,b)=>new Date(b.Timestamp)-new Date(a.Timestamp));
if(sort==="old") list.sort((a,b)=>new Date(a.Timestamp)-new Date(b.Timestamp));
if(sort==="random") list.sort(()=>Math.random()-0.5);
filtered=list;
reset();
}

/* RESET AND LOAD CARDS */
function reset(){gallery.innerHTML="";loaded=0;renderMore();}

/* HIDE LOADER */
function hideLoader(){document.getElementById("pageLoader").style.display="none";}

/* FETCH PROMPTS WITH LOCAL CACHE */
function loadPrompts(){
const cache=localStorage.getItem("promptCache");
const time=localStorage.getItem("promptCacheTime");

if(cache && time && Date.now()-time<300000){
prompts=JSON.parse(cache);
filtered=[...prompts];
applySort();
showIGPopup();
hideLoader();
return;
}

fetch(API)
.then(res=>res.json())
.then(data=>{
prompts=data;
filtered=[...prompts];
localStorage.setItem("promptCache",JSON.stringify(data));
localStorage.setItem("promptCacheTime",Date.now());
applySort();
showIGPopup();
hideLoader();
});
}

loadPrompts();
</script>

</body>
</html>
