<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Prompt Gallery</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui;
}

body{
background:#0f0f0f;
color:white;
padding:16px;
}

body::before{
content:"";
position:fixed;
inset:0;

background:
radial-gradient(circle at 20% 30%,#4f46e5,transparent 45%),
radial-gradient(circle at 80% 70%,#06b6d4,transparent 45%),
radial-gradient(circle at 40% 80%,#4f46e5,transparent 40%);

filter:blur(120px);
opacity:.9;
z-index:-1;
}

#loadingOverlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.75);
display:flex;
align-items:center;
justify-content:center;
z-index:999;
transition:opacity .4s ease;
}

#loadingOverlay.hide{
opacity:0;
pointer-events:none;
}

.loadingBox{
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,.2);
backdrop-filter:blur(40px);
padding:34px 42px;
border-radius:16px;
text-align:center;
position:relative;
}

.closeLoading{
position:absolute;
top:10px;
right:12px;
cursor:pointer;
font-size:18px;
opacity:.6;
}

.closeLoading:hover{
opacity:1;
}

.bigLoader{
width:50px;
height:50px;
border:5px solid rgba(255,255,255,.2);
border-top:5px solid #4f46e5;
border-radius:50%;
margin:auto;
margin-bottom:14px;
animation:spin .8s linear infinite;
}

@keyframes spin{
to{transform:rotate(360deg);}
}

.gallery{
max-width:1100px;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
grid-auto-rows:10px;
gap:12px;
}

.card{
background:rgba(255,255,255,.05);
border-radius:14px;
overflow:hidden;
cursor:pointer;
border:1px solid rgba(255,255,255,.12);
opacity:0;
transform:translateY(10px);
transition:.35s;
}

.card.show{
opacity:1;
transform:translateY(0);
}

.card img{
width:100%;
display:block;
}

.cardTitle{
padding:10px;
font-size:13px;
font-weight:700;
text-align:center;
color:white;
line-height:1.35;
background:rgba(0,0,0,.35);
}

</style>
</head>

<body>

<div id="gallery" class="gallery"></div>

<script>

const API="https://script.google.com/macros/s/AKfycbx4XOgMkg1KE5b0xEfNzx9RF2hQa2GZ-O9S3I95w_UFSjYC8RhGKIT5AMeUPvRFBBmx/exec"

let prompts=[]
let filtered=[]
let loaded=0

const batch=12
const gallery=document.getElementById("gallery")

function formatImage(url){

if(!url) return ""

let id=""

if(url.includes("open?id="))
id=url.split("open?id=")[1]

else if(url.includes("/file/d/"))
id=url.split("/file/d/")[1].split("/")[0]

if(id) return "https://lh3.googleusercontent.com/d/"+id

return url

}

function resizeCard(card){

const rowHeight=10
const rowGap=12

const height=card.getBoundingClientRect().height

const span=Math.ceil((height+rowGap)/(rowHeight+rowGap))

card.style.gridRowEnd="span "+span

}

function renderMore(){

const next=filtered.slice(loaded,loaded+batch)

next.forEach(p=>{

const index=prompts.indexOf(p)
const img=formatImage(p["Image File"])
const title=p["Prompt Title"] || "AI Prompt"

const card=document.createElement("div")
card.className="card"

card.innerHTML=`
<img src="${img}">
<div class="cardTitle">${title}</div>
`

card.onclick=()=>{
window.location.href=`prompt.html?id=${index}`
}

gallery.appendChild(card)

const image=card.querySelector("img")

image.onload=()=>{

resizeCard(card)
card.classList.add("show")

}

})

loaded+=batch

}

fetch(API)
.then(res=>res.json())
.then(data=>{

prompts=data
filtered=data

renderMore()

})

</script>

</body>
</html>
